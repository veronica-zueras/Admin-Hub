<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reportes — Admin Hub</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #041C2E;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  color: #E0F7FF;
  min-height: 100vh;
}
.bg-overlay { position: fixed; inset: 0; z-index: 0; pointer-events: none; background: radial-gradient(circle at center, rgba(0,60,110,0.45) 0%, rgba(4,28,46,0.85) 60%, #041C2E 100%); }
canvas#bgc { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
.corner { position: fixed; width: 28px; height: 28px; z-index: 5; pointer-events: none; }
.corner.tl { top:14px; left:14px; border-top:1.5px solid rgba(0,230,255,0.35); border-left:1.5px solid rgba(0,230,255,0.35); }
.corner.tr { top:14px; right:14px; border-top:1.5px solid rgba(0,230,255,0.35); border-right:1.5px solid rgba(0,230,255,0.35); }
.corner.bl { bottom:14px; left:14px; border-bottom:1.5px solid rgba(0,230,255,0.35); border-left:1.5px solid rgba(0,230,255,0.35); }
.corner.br { bottom:14px; right:14px; border-bottom:1.5px solid rgba(0,230,255,0.35); border-right:1.5px solid rgba(0,230,255,0.35); }
.sys-tag { position:fixed; bottom:18px; left:50%; transform:translateX(-50%); font-family:'Courier New',monospace; font-size:9px; letter-spacing:0.14em; color:rgba(0,200,255,0.15); z-index:5; pointer-events:none; white-space:nowrap; }

/* Topbar */
.topbar { position:relative; z-index:20; padding:20px 28px 16px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid rgba(0,230,255,0.08); }
.brand { display:flex; align-items:center; gap:12px; }
.brand-sq { width:40px; height:40px; border-radius:11px; background:#003A5C; border:1px solid rgba(0,230,255,0.4); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.brand-name { color:#fff; font-size:17px; font-weight:500; letter-spacing:-0.02em; }
.brand-dept { color:rgba(0,230,255,0.38); font-size:11px; margin-top:2px; letter-spacing:0.03em; }
.back-btn { display:flex; align-items:center; gap:7px; background:rgba(0,90,130,0.15); border:1px solid rgba(0,230,255,0.25); border-radius:10px; padding:7px 14px; color:rgba(0,230,255,0.8); font-size:12px; cursor:pointer; text-decoration:none; transition:all 0.2s; }
.back-btn:hover { background:rgba(0,230,255,0.1); border-color:rgba(0,230,255,0.6); color:#00E6FF; }

/* Page head */
.page-head { position:relative; z-index:10; padding:26px 32px 0; display:flex; align-items:center; justify-content:center; }
.page-head-inner { text-align:center; }
.page-eyebrow { font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:rgba(0,230,255,0.35); margin-bottom:6px; display:flex; align-items:center; gap:6px; justify-content:center; }
.page-eyebrow::before { content:''; display:inline-block; width:18px; height:1px; background:rgba(0,230,255,0.3); }
.page-title { font-size:26px; font-weight:600; letter-spacing:-0.03em; color:#E0F7FF; display:flex; align-items:center; gap:12px; justify-content:center; }
.page-title svg { filter:drop-shadow(0 0 8px rgba(0,230,255,0.5)); }
.page-sub { color:rgba(0,200,230,0.35); font-size:12px; margin-top:5px; }
.add-btn { display:flex; align-items:center; gap:8px; background:rgba(0,80,130,0.3); border:1.5px solid rgba(0,230,255,0.4); border-radius:10px; padding:10px 18px; color:#00E6FF; font-size:13px; font-weight:500; cursor:pointer; transition:all 0.2s; white-space:nowrap; font-family:inherit; position:absolute; top:20px; right:28px; z-index:20; }
.add-btn:hover { background:rgba(0,230,255,0.12); border-color:#00E6FF; transform:translateY(-1px); }

/* Toolbar */
.toolbar { position:relative; z-index:10; padding:18px 32px 0; display:flex; align-items:center; justify-content:center; gap:12px; }
.search-wrap { width:38%; min-width:200px; position:relative; }
.search-wrap svg { position:absolute; left:12px; top:50%; transform:translateY(-50%); pointer-events:none; }
.search-input { width:100%; background:rgba(0,20,40,0.8); border:1px solid rgba(0,230,255,0.6); border-radius:10px; padding:10px 14px 10px 38px; color:#E0F7FF; font-size:13px; font-family:inherit; outline:none; transition:border-color 0.2s; }
.search-input:focus { border-color:#00E6FF; box-shadow:0 0 0 3px rgba(0,230,255,0.12); }
.search-input::placeholder { color:rgba(0,200,230,0.22); }
.total-pill { background:rgba(0,30,55,0.8); border:1px solid rgba(0,230,255,0.15); border-radius:8px; padding:6px 12px; font-size:11px; color:rgba(0,200,230,0.5); white-space:nowrap; }

/* Divider */
.divider { position:relative; z-index:10; margin:20px 32px 0; height:1px; background:rgba(0,230,255,0.07); }

/* Grid */
.grid { position:relative; z-index:10; padding:18px 32px 60px; display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:14px; min-height:120px; }

/* Cards */
@keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
.r-card {
  background:rgba(0,16,32,0.85); border:1px solid rgba(0,230,255,0.1);
  border-radius:14px; padding:0; display:flex; flex-direction:column;
  transition:border-color 0.2s, transform 0.2s, box-shadow 0.2s;
  position:relative; overflow:hidden; cursor:pointer;
  animation:fadeUp 0.35s ease both;
}
.r-card:hover { border-color:rgba(0,230,255,0.38); transform:translateY(-2px); box-shadow:0 8px 32px rgba(0,80,180,0.16); }
.card-accent { height:3px; width:100%; }
.card-body { padding:16px 18px 14px; display:flex; flex-direction:column; gap:10px; flex:1; }
.card-top { display:flex; align-items:flex-start; gap:12px; }
.card-icon { width:42px; height:42px; flex-shrink:0; border-radius:10px; background:rgba(0,40,70,0.9); border:1px solid rgba(0,230,255,0.15); display:flex; align-items:center; justify-content:center; }
.card-title-block { flex:1; min-width:0; padding-right:24px; }
.card-title { font-size:14px; font-weight:600; color:#E0F7FF; line-height:1.3; }
.card-desc { font-size:12px; color:rgba(0,200,230,0.4); line-height:1.6; flex:1; }
.card-footer { display:flex; align-items:center; justify-content:space-between; padding-top:10px; border-top:1px solid rgba(0,230,255,0.07); }
.card-date { font-size:10px; color:rgba(0,180,210,0.28); font-family:'Courier New',monospace; }
.card-actions { display:flex; gap:5px; }
.icon-btn { width:28px; height:28px; border-radius:7px; background:transparent; border:1px solid rgba(0,230,255,0.14); color:rgba(0,210,255,0.45); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all 0.15s; }
.icon-btn:hover { background:rgba(0,230,255,0.09); border-color:rgba(0,230,255,0.5); color:#00E6FF; }
.ext-arrow { position:absolute; top:14px; right:14px; color:rgba(0,230,255,0.2); transition:color 0.2s; }
.r-card:hover .ext-arrow { color:rgba(0,230,255,0.6); }

/* Loading / Empty */
.loading-state, .empty-state { grid-column:1/-1; text-align:center; padding:4rem 1rem; color:rgba(0,200,230,0.28); }
.loading-dots { display:inline-flex; gap:6px; margin-bottom:12px; }
.loading-dots span { width:6px; height:6px; border-radius:50%; background:rgba(0,230,255,0.4); animation:ldot 1.2s ease-in-out infinite; }
.loading-dots span:nth-child(2){animation-delay:.2s;} .loading-dots span:nth-child(3){animation-delay:.4s;}
@keyframes ldot { 0%,60%,100%{transform:translateY(0);opacity:.4;} 30%{transform:translateY(-6px);opacity:1;} }
.empty-state svg { margin-bottom:14px; opacity:0.35; display:block; margin-left:auto; margin-right:auto; }
.empty-state p { font-size:14px; }
.empty-state .sub { font-size:12px; margin-top:6px; color:rgba(0,180,210,0.2); }

/* Modal */
.overlay { position:fixed; inset:0; z-index:200; background:rgba(0,5,15,0.85); backdrop-filter:blur(6px); display:none; align-items:center; justify-content:center; padding:1rem; }
.overlay.open { display:flex; }
.modal { width:min(500px,96vw); max-height:90vh; overflow-y:auto; background:#030E1E; border:1px solid rgba(0,230,255,0.3); border-radius:18px; padding:24px; box-shadow:0 0 60px rgba(0,180,255,0.12); animation:fadeUp 0.28s ease; }
.modal-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; padding-bottom:14px; border-bottom:1px solid rgba(0,230,255,0.1); }
.modal-head h2 { font-size:15px; font-weight:600; color:#E0F7FF; display:flex; align-items:center; gap:8px; }
.modal-close { width:30px; height:30px; border-radius:8px; background:transparent; border:1px solid rgba(0,230,255,0.2); color:rgba(0,230,255,0.5); font-size:15px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s; font-family:inherit; }
.modal-close:hover { background:rgba(0,230,255,0.1); color:#00E6FF; border-color:rgba(0,230,255,0.5); }
.field { margin-bottom:14px; }
.field label { display:block; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:rgba(0,200,230,0.4); margin-bottom:6px; }
.field input, .field textarea, .field select { width:100%; background:rgba(0,20,40,0.8); border:1px solid rgba(0,230,255,0.18); border-radius:9px; padding:10px 13px; color:#E0F7FF; font-size:13px; font-family:inherit; outline:none; transition:border-color 0.2s; appearance:none; }
.field input:focus, .field textarea:focus, .field select:focus { border-color:rgba(0,230,255,0.5); box-shadow:0 0 0 3px rgba(0,230,255,0.07); }
.field input::placeholder, .field textarea::placeholder { color:rgba(0,200,230,0.22); }
.field textarea { resize:vertical; min-height:72px; }
.field select option { background:#030E1E; color:#E0F7FF; }
.modal-foot { display:flex; justify-content:flex-end; gap:8px; padding-top:14px; border-top:1px solid rgba(0,230,255,0.08); margin-top:4px; }
.btn-cancel { background:transparent; border:1px solid rgba(0,230,255,0.2); border-radius:9px; padding:9px 16px; color:rgba(0,200,230,0.5); font-size:13px; cursor:pointer; font-family:inherit; transition:all 0.15s; }
.btn-cancel:hover { background:rgba(0,230,255,0.06); color:#00E6FF; }
.btn-save { background:rgba(0,80,130,0.4); border:1.5px solid rgba(0,230,255,0.45); border-radius:9px; padding:9px 20px; color:#00E6FF; font-size:13px; font-weight:500; cursor:pointer; font-family:inherit; transition:all 0.15s; }
.btn-save:hover { background:rgba(0,230,255,0.12); border-color:#00E6FF; }

@media(max-width:600px){
  .topbar,.page-head,.toolbar,.grid { padding-left:16px; padding-right:16px; }
  .grid { grid-template-columns:1fr; }
  .page-title { font-size:20px; }
}
</style>
</head>
<body>

<div class="bg-overlay"></div>
<canvas id="bgc"></canvas>
<div class="corner tl"></div><div class="corner tr"></div>
<div class="corner bl"></div><div class="corner br"></div>
<div class="sys-tag">SYS.REPORTES v1.0 · NET.ACTIVE</div>

<!-- Topbar -->
<div class="topbar">
  <div class="brand">
    <div class="brand-sq">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <rect x="2" y="2" width="7" height="7" rx="1.5" fill="#00E6FF"/>
        <rect x="11" y="2" width="7" height="7" rx="1.5" fill="#00E6FF"/>
        <rect x="2" y="11" width="7" height="7" rx="1.5" fill="#00E6FF"/>
        <rect x="11" y="11" width="7" height="7" rx="1.5" fill="rgba(0,230,255,0.28)"/>
      </svg>
    </div>
    <div>
      <div class="brand-name">Admin Hub</div>
      <div class="brand-dept">Gestión Cobros</div>
    </div>
  </div>
  <a href="../index.html" class="back-btn">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
    Volver al Hub
  </a>
</div>

<!-- Page header -->
<div class="page-head">
  <div class="page-head-inner">
    <div class="page-eyebrow">módulo · reportes</div>
    <div class="page-title">
      <svg width="26" height="26" viewBox="0 0 30 30" fill="none">
        <path d="M3 26l7-10 6 5 6-11 6 7" stroke="#00E6FF" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Reportes
    </div>
    <div class="page-sub">Informes operativos · Gestión de Cobros</div>
  </div>
  <button class="add-btn" onclick="openAdd()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Añadir reporte
  </button>
</div>

<!-- Toolbar -->
<div class="toolbar">
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(0,230,255,0.35)" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input class="search-input" id="searchInput" type="text" placeholder="Buscar reportes…" oninput="renderGrid()">
  </div>
  <div class="total-pill" id="totalPill">0 reportes</div>
</div>

<div class="divider"></div>

<div class="grid" id="grid">
  <div class="loading-state">
    <div class="loading-dots"><span></span><span></span><span></span></div>
    <p>Cargando reportes…</p>
  </div>
</div>

<!-- Modal -->
<div class="overlay" id="formOverlay">
  <div class="modal">
    <div class="modal-head">
      <h2>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#22D3EE" stroke-width="2" stroke-linecap="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
        <span id="formTitle">Nuevo reporte</span>
      </h2>
      <button class="modal-close" onclick="closeOverlay()">✕</button>
    </div>
    <div class="field">
      <label>Nombre *</label>
      <input type="text" id="fTitle" placeholder="Nombre del reporte">
    </div>
    <div class="field">
      <label>Descripción</label>
      <textarea id="fDesc" placeholder="Breve descripción…"></textarea>
    </div>
    <div class="field">
      <label>Enlace</label>
      <input type="url" id="fUrl" placeholder="https://…">
    </div>
    <div class="field">
      <label>Color</label>
      <select id="fColor">
        <option value="#00E6FF">Cyan</option>
        <option value="#1dcc84">Verde</option>
        <option value="#f0a830">Naranja</option>
        <option value="#3aabf0">Azul</option>
        <option value="#a878f0">Morado</option>
        <option value="#f07878">Rojo</option>
      </select>
    </div>
    <div class="modal-foot">
      <button id="deleteBtn" onclick="deleteReport()" style="display:none;align-items:center;gap:6px;background:rgba(163,45,45,0.15);border:1px solid rgba(240,149,149,0.3);border-radius:9px;padding:9px 16px;color:#F09595;font-size:13px;cursor:pointer;font-family:inherit;margin-right:auto;transition:all 0.15s;"
        onmouseover="this.style.background='rgba(163,45,45,0.3)'" onmouseout="this.style.background='rgba(163,45,45,0.15)'">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
        Eliminar
      </button>
      <button class="btn-cancel" onclick="closeOverlay()">Cancelar</button>
      <button class="btn-save" onclick="saveReport()">Guardar</button>
    </div>
  </div>
</div>

<script>
const cv = document.getElementById('bgc'), ctx = cv.getContext('2d');
function drawBg() {
  cv.width = window.innerWidth; cv.height = window.innerHeight;
  const W = cv.width, H = cv.height;
  ctx.clearRect(0,0,W,H);
  for(let x=0;x<W;x+=36){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.strokeStyle='rgba(0,160,220,0.07)';ctx.lineWidth=.5;ctx.stroke();}
  for(let y=0;y<H;y+=36){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.strokeStyle='rgba(0,160,220,0.07)';ctx.stroke();}
  for(let x=0;x<W;x+=36) for(let y=0;y<H;y+=36){
    ctx.beginPath();ctx.arc(x,y,.9,0,Math.PI*2);
    ctx.fillStyle=Math.random()>.72?'rgba(0,230,255,0.25)':'rgba(255,255,255,0.05)';ctx.fill();
  }
  for(let i=0;i<80;i++){
    const x=Math.random()*W,y=Math.random()*H,r=Math.random()*1.1+.15;
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=Math.random()>.5?`rgba(0,220,255,${Math.random()*.28+.04})`:`rgba(255,255,255,${Math.random()*.12+.02})`;ctx.fill();
  }
}
drawBg(); window.addEventListener('resize', drawBg);

const WORKER_URL = 'https://lucky-shadow-44ed.veronica-zueras.workers.dev';
const STORE_KEY  = 'adminhub_reportes_v1';

const DEFAULTS = [
  { title:'Becas', desc:'Informe de alumnos con beca activa', url:'', color:'#1dcc84', date:'' },
  { title:'Cierres Antiguos', desc:'Histórico de cierres contables', url:'', color:'#f0a830', date:'' },
  { title:'BI Curva', desc:'Dashboard Power BI · curva de cobros', url:'', color:'#3aabf0', date:'' },
  { title:'SXDataHub', desc:'Plataforma de datos SalesXcelerate', url:'', color:'#a878f0', date:'' }
];

let items = [], editIdx = null;

async function load() {
  try {
    const res = await fetch(`${WORKER_URL}/kv?key=${STORE_KEY}`);
    const data = await res.json();
    items = data.value ? JSON.parse(data.value) : JSON.parse(JSON.stringify(DEFAULTS));
  } catch(e) {
    items = JSON.parse(JSON.stringify(DEFAULTS));
  }
  renderGrid();
}

async function persist() {
  try {
    await fetch(`${WORKER_URL}/kv`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key: STORE_KEY, value: items })
    });
  } catch(e) {
    console.error('Error guardando en KV:', e);
  }
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function iconSvg(color) {
  return `<svg width="20" height="20" viewBox="0 0 30 30" fill="none">
    <path d="M3 26l7-10 6 5 6-11 6 7" stroke="${color}" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

function renderGrid() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = items.filter(r =>
    !q || r.title.toLowerCase().includes(q) || (r.desc||'').toLowerCase().includes(q)
  );
  document.getElementById('totalPill').textContent = items.length + ' reporte' + (items.length!==1?'s':'');
  const grid = document.getElementById('grid');
  if (!filtered.length) {
    grid.innerHTML = `<div class="empty-state">
      <svg width="44" height="44" viewBox="0 0 30 30" fill="none"><path d="M3 26l7-10 6 5 6-11 6 7" stroke="#22D3EE" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <p>${items.length ? 'Ningún reporte coincide' : 'No hay reportes todavía'}</p>
      <p class="sub">${items.length ? 'Prueba con otro término' : 'Haz clic en "Añadir reporte" para comenzar'}</p>
    </div>`;
    return;
  }
  grid.innerHTML = filtered.map((r, fi) => {
    const ri = items.indexOf(r);
    const color = r.color || '#00E6FF';
    return `<div class="r-card" style="animation-delay:${fi*0.05}s"
      onclick="if(!event.target.closest('.icon-btn')&&'${esc(r.url)}') window.open('${esc(r.url)}','_blank')">
      <div class="card-accent" style="background:${color};opacity:0.7;"></div>
      <div class="card-body">
        <div class="card-top">
          <div class="card-icon">${iconSvg(color)}</div>
          <div class="card-title-block">
            <div class="card-title" style="color:${color}">${esc(r.title)}</div>
          </div>
        </div>
        ${r.desc ? `<div class="card-desc">${esc(r.desc)}</div>` : ''}
        <div class="card-footer">
          <span class="card-date">${r.date||''}</span>
          <div class="card-actions">
            <button class="icon-btn" onclick="openEdit(${ri})" title="Editar">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>
            </button>
          </div>
        </div>
      </div>
      ${r.url ? `<div class="ext-arrow">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      </div>` : ''}
    </div>`;
  }).join('');
}

function openAdd() {
  editIdx = null;
  document.getElementById('formTitle').textContent = 'Nuevo reporte';
  document.getElementById('fTitle').value = '';
  document.getElementById('fDesc').value = '';
  document.getElementById('fUrl').value = '';
  document.getElementById('fColor').value = '#00E6FF';
  document.getElementById('deleteBtn').style.display = 'none';
  document.getElementById('formOverlay').classList.add('open');
}

function openEdit(idx) {
  const r = items[idx]; if (!r) return;
  editIdx = idx;
  document.getElementById('formTitle').textContent = 'Editar reporte';
  document.getElementById('fTitle').value = r.title;
  document.getElementById('fDesc').value = r.desc || '';
  document.getElementById('fUrl').value = r.url || '';
  document.getElementById('fColor').value = r.color || '#00E6FF';
  document.getElementById('deleteBtn').style.display = 'flex';
  document.getElementById('formOverlay').classList.add('open');
}

async function saveReport() {
  const title = document.getElementById('fTitle').value.trim();
  if (!title) { alert('El nombre es obligatorio.'); return; }
  const obj = {
    title,
    desc: document.getElementById('fDesc').value.trim(),
    url:  document.getElementById('fUrl').value.trim(),
    color: document.getElementById('fColor').value,
    date: editIdx !== null ? items[editIdx].date : new Date().toLocaleDateString('es-ES')
  };
  if (editIdx !== null) items[editIdx] = obj; else items.unshift(obj);
  await persist();
  closeOverlay();
  renderGrid();
}

async function deleteReport() {
  const r = items[editIdx];
  if (!r || !confirm(`¿Eliminar "${r.title}"?`)) return;
  items.splice(editIdx, 1);
  await persist();
  closeOverlay();
  renderGrid();
}

function closeOverlay() { document.getElementById('formOverlay').classList.remove('open'); }
document.getElementById('formOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('formOverlay')) closeOverlay();
});

load();
</script>
</body>
</html>
