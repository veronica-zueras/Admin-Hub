<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Hub - AIThor Interface</title>
<style>
/* --- BASE & LAYOUT --- */
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #010409; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }

.wrap {
  background: #020B18; border-radius: 20px; overflow: hidden;
  position: relative; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  width: 95vw; height: 90vh; max-width: 1200px; display: flex; flex-direction: column;
  border: 1px solid rgba(0,230,255,0.1);
}

.bg-canvas { position: absolute; inset: 0; z-index: 0; pointer-events: none; }

/* --- TOPBAR --- */
.topbar {
  position: relative; z-index: 20; padding: 22px 28px 0;
  display: flex; align-items: center; justify-content: space-between;
}
.brand { display: flex; align-items: center; gap: 12px; }
.brand-sq {
  width: 40px; height: 40px; border-radius: 11px; background: #003A5C;
  border: 1px solid rgba(0,230,255,0.4);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.brand-name { color: #fff; font-size: 17px; font-weight: 500; letter-spacing: -0.02em; }
.brand-dept { color: rgba(0,230,255,0.38); font-size: 11px; margin-top: 2px; letter-spacing: 0.03em; }

/* --- SCENE & NODES --- */
.scene {
  flex: 1; position: relative; z-index: 5;
  display: flex; align-items: center; justify-content: center;
  padding: 20px; min-height: 400px;
}
.orbit-svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 4; }

.hub {
  position: absolute; left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  width: 114px; height: 114px; border-radius: 50%;
  background: rgba(1,10,22,0.92); border: 2px solid rgba(0,230,255,0.6);
  display: flex; align-items: center; justify-content: center; z-index: 30;
}
.hp { position: absolute; border-radius: 50%; border: 1px solid rgba(0,230,255,0.15); animation: pulsar 3s ease-in-out infinite; }
@keyframes pulsar { 0%,100%{opacity:.2;transform:scale(1);} 50%{opacity:.9;transform:scale(1.07);} }

.node {
  position: absolute; transform: translate(-50%,-50%);
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  cursor: pointer; z-index: 20;
  transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1);
}
.node:hover { transform: translate(-50%,-50%) scale(1.14); }
.bubble { border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1.5px solid rgba(0,230,255,0.15); transition: border-color 0.2s; }
.node:hover .bubble { border-color: rgba(0,230,255,0.65); }
.node-label { font-size: 12px; font-weight: 500; color: rgba(0,200,230,0.45); text-align: center; line-height: 1.2; max-width: 80px; }
.node:hover .node-label { color: #00E6FF; }

/* --- DETAIL PANEL --- */
.detail {
  position: relative; z-index: 20; display: flex; align-items: center; gap: 18px;
  padding: 0 28px; min-height: 96px;
  border-top: 1px solid rgba(0,230,255,0.1);
  background: rgba(0,6,18,0.75); transition: opacity 0.25s;
}
.detail.off { opacity: 0; pointer-events: none; }
.d-orb { width: 54px; height: 54px; border-radius: 16px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(0,230,255,0.2); }
.d-title { color: #E0F7FF; font-size: 19px; font-weight: 500; margin-bottom: 3px; }
.d-desc  { color: rgba(0,200,230,0.42); font-size: 12px; line-height: 1.5; max-width: 450px; }
.d-cta { flex-shrink: 0; margin-left: auto; padding: 11px 22px; border-radius: 10px; background: transparent; border: 1.5px solid rgba(0,230,255,0.5); color: #00E6FF; cursor: pointer; transition: 0.2s; }
.d-cta:hover { background: rgba(0,230,255,0.1); border-color: #00E6FF; }

/* --- AITHOR CHAT UI --- */
.aithor-btn {
  position: fixed; bottom: 24px; right: 24px;
  z-index: 1000; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
}
.aithor-btn-orb {
  width: 64px; height: 64px; border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #3B0764, #1E0533);
  border: 2px solid rgba(168,85,247,0.6);
  display: flex; align-items: center; justify-content: center;
  position: relative; animation: aithor-float 3.8s ease-in-out infinite;
  filter: drop-shadow(0 0 12px rgba(139,92,246,0.5));
}
@keyframes aithor-float { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-8px);} }

.aithor-panel {
  position: fixed; bottom: 110px; right: 24px;
  width: 350px; height: 500px;
  background: #040D1C; border: 1px solid rgba(168,85,247,0.3);
  border-radius: 16px; overflow: hidden;
  display: flex; flex-direction: column; z-index: 999;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 10px 50px rgba(0,0,0,0.8);
}
.aithor-panel.hidden { opacity: 0; pointer-events: none; transform: translateY(20px) scale(0.95); }

.aithor-header {
  padding: 15px; background: rgba(30,5,51,0.8);
  border-bottom: 1px solid rgba(168,85,247,0.2);
  display: flex; justify-content: space-between; align-items: center;
}
.aithor-messages {
  flex: 1; overflow-y: auto; padding: 15px;
  display: flex; flex-direction: column; gap: 12px;
  scrollbar-width: thin; scrollbar-color: #3B0764 transparent;
}
.msg { padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.4; max-width: 85%; }
.msg.bot { background: rgba(0,40,70,0.6); color: #E0F7FF; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid rgba(0,230,255,0.1); }
.msg.user { background: rgba(60,10,100,0.5); color: #F3E8FF; align-self: flex-end; border-bottom-right-radius: 2px; border: 1px solid rgba(168,85,247,0.2); }

.aithor-input-area {
  padding: 12px; border-top: 1px solid rgba(168,85,247,0.1);
  display: flex; gap: 8px; background: #02060F;
}
.aithor-input {
  flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(168,85,247,0.2);
  border-radius: 8px; padding: 8px 12px; color: white; outline: none;
}
.aithor-send {
  background: #581C87; border: none; color: white; padding: 0 15px;
  border-radius: 8px; cursor: pointer; font-weight: bold;
}

/* Animations for SVG Scanner */
@keyframes scan { from{transform:rotate(0deg);}to{transform:rotate(360deg);} }
.scanner { animation: scan 8s linear infinite; transform-origin: 350px 265px; }
.rcw { animation: spin-cw 80s linear infinite; transform-origin: 350px 265px; }
@keyframes spin-cw { from{transform:rotate(0)} to{transform:rotate(360deg)} }
</style>
</head>
<body>

<div class="wrap" id="app">
  <canvas class="bg-canvas" id="bgc"></canvas>

  <div class="topbar">
    <div class="brand">
      <div class="brand-sq">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <rect x="2" y="2" width="7" height="7" rx="1.5" fill="#00E6FF"/>
          <rect x="11" y="2" width="7" height="7" rx="1.5" fill="#00E6FF"/>
          <rect x="2" y="11" width="7" height="7" rx="1.5" fill="#00E6FF"/>
          <rect x="11" y="11" width="7" height="7" rx="1.5" fill="rgba(0,230,255,0.28)"/>
        </svg>
      </div>
      <div>
        <div class="brand-name">Admin Hub</div>
        <div class="brand-dept">Gestión Cobros</div>
      </div>
    </div>
  </div>

  <div class="scene" id="scene">
    <svg class="orbit-svg" viewBox="0 0 700 530" preserveAspectRatio="xMidYMid meet">
      <circle cx="350" cy="265" r="300" fill="none" stroke="rgba(0,180,255,0.05)"/>
      <circle class="rcw" cx="350" cy="265" r="132" fill="none" stroke="rgba(0,230,255,0.1)" stroke-width="1"/>
      <line class="scanner" x1="350" y1="265" x2="350" y2="133" stroke="rgba(0,230,255,0.3)" stroke-width="2"/>
    </svg>

    <div class="hub">
      <div class="hp" style="width:138px;height:138px;"></div>
      <svg width="60" height="60" viewBox="0 0 78 78">
         <circle cx="39" cy="39" r="30" stroke="#00E6FF" stroke-width="2" fill="none" opacity="0.6"/>
      </svg>
    </div>

    <div class="node" style="left:50%;top:16%;" data-k="reportes">
      <div class="bubble" style="width:70px;height:70px;background:#00162A;"><svg width="24" height="24" stroke="#00E6FF" fill="none"><path d="M3 26l7-10 6 5 6-11 6 7"/></svg></div>
      <span class="node-label">Reportes</span>
    </div>
    <div class="node" style="left:80%;top:35%;" data-k="cobros">
      <div class="bubble" style="width:70px;height:70px;background:#001A24;"><svg width="24" height="24" stroke="#00CFCF" fill="none"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg></div>
      <span class="node-label">Cobros</span>
    </div>
    <div class="node" style="left:80%;top:65%;" data-k="check">
        <div class="bubble" style="width:70px;height:70px;background:#001A2E;"><svg width="24" height="24" stroke="#00E6FF" fill="none"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M8 12l3 3 5-5"/></svg></div>
        <span class="node-label">Check</span>
    </div>
    <div class="node" style="left:50%;top:84%;" data-k="seguimientos">
        <div class="bubble" style="width:70px;height:70px;background:#001228;"><svg width="24" height="24" stroke="#5DADE2" fill="none"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-7 8-7s8 3 8 7"/></svg></div>
        <span class="node-label">Seguimientos</span>
    </div>
    <div class="node" style="left:20%;top:65%;" data-k="manuales">
        <div class="bubble" style="width:70px;height:70px;background:#001520;"><svg width="24" height="24" stroke="#22D3EE" fill="none"><path d="M4 19h16M4 5h16M4 12h11"/></svg></div>
        <span class="node-label">Manuales</span>
    </div>
    <div class="node" style="left:20%;top:35%;" data-k="comisiones">
        <div class="bubble" style="width:70px;height:70px;background:#001820;"><svg width="24" height="24" stroke="#40C8E0" fill="none"><circle cx="8" cy="8" r="3"/><circle cx="16" cy="16" r="3"/><path d="M18 6L6 18"/></svg></div>
        <span class="node-label">Comisiones</span>
    </div>
  </div>

  <div class="detail off" id="panel">
    <div class="d-orb" id="d-orb"></div>
    <div>
      <div class="d-title" id="d-title">Selecciona Herramienta</div>
      <div class="d-desc"  id="d-desc">Información del módulo...</div>
    </div>
    <button class="d-cta" id="d-cta">Consultar a AIThor →</button>
  </div>
</div>

<div class="aithor-btn" id="aiBtn">
    <div class="aithor-btn-orb">
        <svg width="30" height="30" viewBox="0 0 100 120" fill="none">
            <path d="M10 50C10 30 30 10 50 10C70 10 90 30 90 50C90 70 70 90 50 90" stroke="#A855F7" stroke-width="5" stroke-linecap="round"/>
            <circle cx="50" cy="50" r="10" fill="#A855F7"/>
        </svg>
    </div>
    <span style="color:#A855F7; font-size:10px; font-weight:bold; letter-spacing:1px;">AITHOR ACTIVE</span>
</div>

<div class="aithor-panel hidden" id="aiPanel">
    <div class="aithor-header">
        <span style="color:#E0F7FF; font-weight:500;">AIThor Intelligence</span>
        <button class="aithor-send" id="closeAi" style="background:transparent; color:#A855F7;">✕</button>
    </div>
    <div class="aithor-messages" id="aiMessages">
        <div class="msg bot">Hola. Soy AIThor. He mapeado todos los módulos de Gestión de Cobros. ¿En qué puedo ayudarte hoy?</div>
    </div>
    <div class="aithor-input-area">
        <input type="text" class="aithor-input" id="aiInput" placeholder="Escribe tu consulta...">
        <button class="aithor-send" id="sendBtn">ENVIAR</button>
    </div>
</div>

<script>
const API_KEY = "AIzaSyAAAgd9UdGiu1KNzi7pkqdrjO4CtL-0cyg"; // Tu clave API
const D = {
  reportes: { label:"Reportes", desc:"Analítica operativa y financiera: dashboards y exportación.", bg:"#00162A", prompt:"Explícame qué puedo ver en el módulo de Reportes de cobros." },
  cobros: { label:"Cobros", desc:"Ciclo completo de cobro y pipeline de reclamación.", bg:"#001A24", prompt:"¿Cómo está funcionando el pipeline de cobros actualmente?" },
  check: { label:"Check", desc:"Validación y control de calidad de operaciones.", bg:"#001A2E", prompt:"¿Qué revisiones de calidad tengo pendientes en Check?" },
  seguimientos: { label:"Seguimientos", desc:"Histórico de interacciones y alertas de contacto.", bg:"#001228", prompt:"Resúmeme los seguimientos de clientes más urgentes." },
  manuales: { label:"Manuales", desc:"Guías de procedimiento y documentación interna.", bg:"#001520", prompt:"¿Dónde encuentro el manual para devoluciones?" },
  comisiones: { label:"Comisiones", desc:"Cálculo de estructuras por agente y liquidaciones.", bg:"#001820", prompt:"¿Cómo se calculan las comisiones este mes?" }
};

// --- LOGICA DEL HUB ---
document.querySelectorAll('.node').forEach(n => {
  n.addEventListener('click', () => {
    const k = n.dataset.k, d = D[k];
    const panel = document.getElementById('panel');
    panel.classList.remove('off');
    document.getElementById('d-title').textContent = d.label;
    document.getElementById('d-desc').textContent = d.desc;
    document.getElementById('d-cta').onclick = () => askAIThor(d.prompt);
  });
});

// --- LÓGICA AITHOR & GEMINI API ---
const aiPanel = document.getElementById('aiPanel');
const aiBtn = document.getElementById('aiBtn');
const aiMessages = document.getElementById('aiMessages');
const aiInput = document.getElementById('aiInput');
const sendBtn = document.getElementById('sendBtn');

aiBtn.onclick = () => aiPanel.classList.toggle('hidden');
document.getElementById('closeAi').onclick = () => aiPanel.classList.add('hidden');

async function askAIThor(text) {
  if(!text) return;
  aiPanel.classList.remove('hidden');
  
  // Agregar mensaje usuario
  addMessage(text, 'user');
  aiInput.value = '';

  // Indicador de carga
  const loadingMsg = addMessage('Procesando...', 'bot');

  try {
    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [{ parts: [{ text: `Eres AIThor, un asistente experto en un sistema de Gestión de Cobros. Responde de forma concisa y profesional: ${text}` }] }]
      })
    });

    const data = await response.json();
    const aiText = data.candidates[0].content.parts[0].text;
    loadingMsg.textContent = aiText;

  } catch (error) {
    loadingMsg.textContent = "Error de conexión con el núcleo de IA. Verifica la API Key.";
  }
}

function addMessage(text, side) {
  const m = document.createElement('div');
  m.className = `msg ${side}`;
  m.textContent = text;
  aiMessages.appendChild(m);
  aiMessages.scrollTop = aiMessages.scrollHeight;
  return m;
}

sendBtn.onclick = () => askAIThor(aiInput.value);
aiInput.onkeypress = (e) => { if(e.key === 'Enter') askAIThor(aiInput.value); };

// --- FONDO ANIMADO ---
const cv = document.getElementById('bgc');
const ctx = cv.getContext('2d');
function drawBg() {
  cv.width = window.innerWidth; cv.height = window.innerHeight;
  ctx.strokeStyle = 'rgba(0,160,220,0.05)';
  for(let x=0; x<cv.width; x+=40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,cv.height); ctx.stroke(); }
  for(let y=0; y<cv.height; y+=40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(cv.width,y); ctx.stroke(); }
}
window.onresize = drawBg;
drawBg();
</script>
</body>
</html>
