<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
.wrap {
  background: #020B18; border-radius: 20px; overflow: hidden;
  position: relative; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  min-height: 740px; display: flex; flex-direction: column;
}
.bg-canvas { position: absolute; inset: 0; z-index: 0; pointer-events: none; }
.topbar {
  position: relative; z-index: 20; padding: 22px 28px 0;
  display: flex; align-items: center; justify-content: space-between;
}
.brand { display: flex; align-items: center; gap: 12px; }
.brand-sq {
  width: 40px; height: 40px; border-radius: 11px; background: #003A5C;
  border: 1px solid rgba(0,230,255,0.4);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.brand-name { color: #fff; font-size: 17px; font-weight: 500; letter-spacing: -0.02em; }
.brand-dept { color: rgba(0,230,255,0.38); font-size: 11px; margin-top: 2px; letter-spacing: 0.03em; }

/* AI AGENT BADGE - MODIFICADO PARA TAMAÑO MÁS PEQUEÑO Y NUEVA UBICACIÓN */
.ai-badge {
  display: flex; align-items: center; gap: 7px; /* Gap reducido */
  background: rgba(0,90,130,0.15);
  border: 1px solid rgba(0,230,255,0.25);
  border-radius: 10px; /* Radio reducido */
  padding: 5px 10px 5px 6px; /* Padding reducido */
  cursor: default;
  position: absolute; /* Posicionamiento absoluto */
  bottom: 12px; /* Un poco más abajo */
  right: 14px;
  z-index: 50; /* Por encima de otros elementos */
}
.ai-orb {
  width: 30px; height: 30px; border-radius: 50%; /* Tamaño reducido */
  background: #001828;
  border: 1px solid rgba(0,230,255,0.45); /* Borde más fino */
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; position: relative;
}
.ai-orb-ring {
  position: absolute; width: 36px; height: 36px; border-radius: 50%; /* Tamaño reducido */
  border: 1px solid rgba(0,230,255,0.15);
  animation: ai-pulse 2.5s ease-in-out infinite;
}
@keyframes ai-pulse { 0%,100%{opacity:.2;transform:scale(1);} 50%{opacity:.7;transform:scale(1.06);} }
.ai-texts { display: flex; flex-direction: column; gap: 1px; } /* Gap reducido */
.ai-status { display: flex; align-items: center; gap: 4px; } /* Gap reducido */
.ai-dot {
  width: 4px; height: 4px; border-radius: 50%; background: #00E6FF; /* Tamaño reducido */
  animation: blink 1.8s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:.25;} }
.ai-status-text { color: rgba(0,230,255,0.5); font-size: 8px; letter-spacing: 0.08em; text-transform: uppercase; } /* Fuente reducida */
.ai-name { color: rgba(0,230,255,0.9); font-size: 11px; font-weight: 500; letter-spacing: -0.01em; } /* Fuente reducida */

.scene {
  flex: 1; position: relative; z-index: 5;
  display: flex; align-items: center; justify-content: center;
  padding: 20px 20px 0; min-height: 560px;
}
.orbit-svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 4; }
.hub {
  position: absolute; left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  width: 114px; height: 114px; border-radius: 50%;
  background: rgba(1,10,22,0.92); border: 2px solid rgba(0,230,255,0.6);
  display: flex; align-items: center; justify-content: center; z-index: 30;
}
.hp { position: absolute; border-radius: 50%; border: 1px solid rgba(0,230,255,0.15); animation: pulsar 3s ease-in-out infinite; }
@keyframes pulsar { 0%,100%{opacity:.2;transform:scale(1);} 50%{opacity:.9;transform:scale(1.07);} }
.node {
  position: absolute; transform: translate(-50%,-50%);
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  cursor: pointer; z-index: 20;
  transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1);
}
.node:hover { transform: translate(-50%,-50%) scale(1.14); }
.bubble { border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1.5px solid rgba(0,230,255,0.15); transition: border-color 0.2s; }
.node:hover .bubble { border-color: rgba(0,230,255,0.65); }
.node-label { font-size: 12px; font-weight: 500; color: rgba(0,200,230,0.45); text-align: center; line-height: 1.2; max-width: 80px; transition: color 0.2s; }
.node:hover .node-label { color: #00E6FF; }
.detail {
  position: relative; z-index: 20; display: flex; align-items: center; gap: 18px;
  padding: 0 28px; min-height: 96px;
  border-top: 1px solid rgba(0,230,255,0.1);
  background: rgba(0,6,18,0.75); transition: opacity 0.25s;
}
.detail.off { opacity: 0; pointer-events: none; }
.d-orb { width: 54px; height: 54px; border-radius: 16px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(0,230,255,0.2); }
.d-title { color: #E0F7FF; font-size: 19px; font-weight: 500; letter-spacing: -0.02em; margin-bottom: 3px; }
.d-desc  { color: rgba(0,200,230,0.42); font-size: 12px; line-height: 1.5; max-width: 450px; }
.d-cta { flex-shrink: 0; margin-left: auto; padding: 11px 22px; border-radius: 10px; background: transparent; border: 1.5px solid rgba(0,230,255,0.5); color: #00E6FF; font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; transition: background .15s, border-color .15s; }
.d-cta:hover { background: rgba(0,230,255,0.1); border-color: #00E6FF; }
.hint { position: absolute; bottom: 108px; left: 50%; transform: translateX(-50%); color: rgba(0,230,255,0.13); font-size: 11px; letter-spacing: .1em; pointer-events: none; z-index: 6; white-space: nowrap; }
@keyframes spin-cw  { from{transform:rotate(0)} to{transform:rotate(360deg)} }
@keyframes spin-ccw { from{transform:rotate(0)} to{transform:rotate(-360deg)} }
.rcw  { animation: spin-cw   80s linear infinite; transform-origin: 350px 265px; }
.rccw { animation: spin-ccw 120s linear infinite; transform-origin: 350px 265px; }
@keyframes scan { from{transform:rotate(0deg);}to{transform:rotate(360deg);} }
.scanner { animation: scan 8s linear infinite; transform-origin: 350px 265px; }
</style>

      <div class="bubble" style="width:64px;height:64px;background:rgba(0,10,30,0.92);border:1.5px solid rgba(0,230,255,0.35);">
        <svg width="26" height="26" viewBox="0 0 26 26" fill="none"><rect x="2" y="3" width="22" height="16" rx="3" stroke="#00BFFF" stroke-width="1.6"/><path d="M7 23l3-4h9l3 4" stroke="#00BFFF" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M7 9h12M7 14h7" stroke="#00BFFF" stroke-width="1.4" stroke-linecap="round"/></svg>
      </div>
      <span class="node-label" style="font-size:11px;color:rgba(0,191,255,0.6);">Convo '27</span>
    </div>

    <div class="hint" id="hint">toca una herramienta</div>
  </div>

  <div class="detail off" id="panel">
    <div class="d-orb" id="d-orb"></div>
    <div>
      <div class="d-title" id="d-title"></div>
      <div class="d-desc"  id="d-desc"></div>
    </div>
    <button class="d-cta" id="d-cta">Abrir →</button>
  </div>
</div>

<script>
const D = {
  reportes:     { label:"Reportes",      desc:"Analítica operativa y financiera: dashboards por línea editorial, comparativas mensuales y exportación.",      bg:"#00162A", ic:"#00E6FF", prompt:"Diseña el módulo de Reportes del Admin Hub" },
  cobros:       { label:"Cobros",        desc:"Ciclo completo de cobro: vencimientos, pipeline de reclamación por fases y estado en tiempo real por cliente.", bg:"#001A24", ic:"#00CFCF", prompt:"Diseña el módulo de Cobros del Admin Hub" },
  check:        { label:"Check",         desc:"Validación y verificación de operaciones: control de calidad, revisiones pendientes y aprobaciones del equipo.", bg:"#001A2E", ic:"#00E6FF", prompt:"Diseña el módulo de Check del Admin Hub" },
  seguimientos: { label:"Seguimientos",  desc:"Seguimiento de clientes y expedientes: histórico de interacciones, alertas de contacto y estado de gestión.",   bg:"#001228", ic:"#5DADE2", prompt:"Diseña el módulo de Seguimientos del Admin Hub" },
  manuales:     { label:"Manuales",      desc:"Repositorio de manuales operativos, guías de procedimiento y documentación interna del departamento.",          bg:"#001520", ic:"#22D3EE", prompt:"Diseña el módulo de Manuales del Admin Hub" },
  comisiones:   { label:"Comisiones",    desc:"Cálculo y seguimiento de comisiones: estructuras por agente, liquidaciones periódicas y trazabilidad completa.", bg:"#001820", ic:"#40C8E0", prompt:"Diseña el módulo de Comisiones del Admin Hub" },
  convo:        { label:"Convo '27",     desc:"Convocatoria 2027: planning, documentación, hitos del calendario y seguimiento de objetivos del ejercicio.",    bg:"#000E28", ic:"#00BFFF", prompt:"Diseña el módulo Convo 27 del Admin Hub" }
};
const ICONS = {
  reportes:`<svg width="26" height="26" viewBox="0 0 26 26" fill="none"><path d="M2.5 22l6-8.5 5 4 5-9 5.5 6" stroke="{c}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
  cobros:`<svg width="26" height="26" viewBox="0 0 26 26" fill="none"><circle cx="13" cy="13" r="10" stroke="{c}" stroke-width="1.5"/><path d="M13 8.5v5.5l3.5 2.5" stroke="{c}" stroke-width="1.5" stroke-linecap="round"/></svg>`,
  check:`<svg width="26" height="26" viewBox="0 0 26 26" fill="none"><rect x="3" y="3" width="20" height="20" rx="3.5" stroke="{c}" stroke-width="1.5"/><path d="M7 13l4.5 4.5 7.5-8" stroke="{c}" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
  seguimientos:`<svg width="26" height="26" viewBox="0 0 26 26" fill="none"><circle cx="13" cy="9" r="5" stroke="{c}" stroke-width="1.5"/><path d="M4 24c0-4.97 4.03-9 9-9s9 4.03 9 9" stroke="{c}" stroke-width="1.5" stroke-linecap="round"/></svg>`,
  manuales:`<svg width="26" height="26" viewBox="0 0 26 26" fill="none"><rect x="3" y="1.5" width="20" height="23" rx="2.5" stroke="{c}" stroke-width="1.5"/><path d="M7 9h12M7 14h12M7 19h8" stroke="{c}" stroke-width="1.4" stroke-linecap="round"/></svg>`,
  comisiones:`<svg width="26" height="26" viewBox="0 0 26 26" fill="none"><circle cx="9" cy="9" r="3.5" stroke="{c}" stroke-width="1.5"/><circle cx="17" cy="17" r="3.5" stroke="{c}" stroke-width="1.5"/><line x1="5.5" y1="20.5" x2="20.5" y2="5.5" stroke="{c}" stroke-width="1.4" stroke-linecap="round"/></svg>`,
  convo:`<svg width="26" height="26" viewBox="0 0 26 26" fill="none"><rect x="2" y="3" width="22" height="15" rx="2.5" stroke="{c}" stroke-width="1.5"/><path d="M7 22l2.5-4h7l2.5 4" stroke="{c}" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M7 9h12M7 13.5h6" stroke="{c}" stroke-width="1.4" stroke-linecap="round"/></svg>`
};
document.querySelectorAll('.node').forEach(n => {
  n.addEventListener('click', () => {
    const k = n.dataset.k, d = D[k];
    if (!d) return;
    document.getElementById('hint').style.display = 'none';
    const panel = document.getElementById('panel');
    panel.classList.remove('off');
    const orb = document.getElementById('d-orb');
    orb.style.background = d.bg;
    orb.innerHTML = ICONS[k].replace(/\{c\}/g, d.ic);
    document.getElementById('d-title').textContent = d.label;
    document.getElementById('d-desc').textContent  = d.desc;
    document.getElementById('d-cta').onclick = () => sendPrompt(d.prompt);
  });
});
document.getElementById('scene').addEventListener('click', e => {
  if (!e.target.closest('.node')) document.getElementById('panel').classList.add('off');
});
const cv = document.getElementById('bgc');
const ctx = cv.getContext('2d');
function drawBg() {
  cv.width = cv.offsetWidth; cv.height = cv.offsetHeight;
  const W = cv.width, H = cv.height;
  ctx.clearRect(0,0,W,H);
  ctx.lineWidth = 0.5;
  for(let x=0;x<W;x+=36){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.strokeStyle='rgba(0,160,220,0.05)';ctx.stroke();}
  for(let y=0;y<H;y+=36){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.strokeStyle='rgba(0,160,220,0.05)';ctx.stroke();}
  for(let x=0;x<W;x+=36){for(let y=0;y<H;y+=36){ctx.beginPath();ctx.arc(x,y,0.9,0,Math.PI*2);ctx.fillStyle=Math.random()>.72?'rgba(0,230,255,0.28)':'rgba(255,255,255,0.06)';ctx.fill();}}
  for(let i=0;i<90;i++){const x=Math.random()*W,y=Math.random()*H,r=Math.random()*1.1+0.15;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=Math.random()>.5?`rgba(0,220,255,${Math.random()*.35+.05})`:`rgba(255,255,255,${Math.random()*.18+.03})`;ctx.fill();}
  const hexPts=[{x:.06,y:.2},{x:.94,y:.2},{x:.06,y:.75},{x:.94,y:.75},{x:.12,y:.5},{x:.88,y:.5},{x:.35,y:.07},{x:.65,y:.07},{x:.35,y:.93},{x:.65,y:.93}];
  hexPts.forEach(h=>{const hx=h.x*W,hy=h.y*H,hs=8+Math.random()*10;ctx.beginPath();for(let i=0;i<6;i++){const a=Math.PI/3*i-Math.PI/6,px=hx+hs*Math.cos(a),py=hy+hs*Math.sin(a);i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);}ctx.closePath();ctx.strokeStyle=Math.random()>.45?'rgba(0,230,255,0.2)':'rgba(255,255,255,0.08)';ctx.lineWidth=0.8;ctx.stroke();});
  const br=22;[[22,22,1,1],[W-22,22,-1,1],[22,H-22,1,-1],[W-22,H-22,-1,-1]].forEach(([bx,by,sx,sy])=>{ctx.beginPath();ctx.moveTo(bx,by+sy*br);ctx.lineTo(bx,by);ctx.lineTo(bx+sx*br,by);ctx.strokeStyle='rgba(0,230,255,0.4)';ctx.lineWidth=1.3;ctx.stroke();});
}
drawBg(); window.addEventListener('resize', drawBg);
</script>
