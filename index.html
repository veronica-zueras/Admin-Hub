<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Hub</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0a2540; margin: 0; padding: 0; }
.wrap { background: #0a2540; border-radius: 0; position: relative; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
.bg-image { position: absolute; inset: 0; z-index: 0; pointer-events: none; background-size: cover; background-position: center; opacity: 0.18; }
.bg-overlay { position: absolute; inset: 0; z-index: 1; pointer-events: none; background: radial-gradient(circle at center, rgba(10,37,64,0.4) 0%, rgba(10,37,64,0.7) 60%, rgba(8,30,52,0.9) 100%); }
.bg-canvas { position: absolute; inset: 0; z-index: 2; pointer-events: none; }
.topbar { position: relative; z-index: 20; padding: 22px 28px 0; display: flex; align-items: center; justify-content: space-between; }
.brand { display: flex; align-items: center; gap: 12px; }
.brand-sq { width: 40px; height: 40px; border-radius: 11px; background: #003A5C; border: 1px solid rgba(0,230,255,0.4); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.brand-name { color: #fff; font-size: 17px; font-weight: 500; letter-spacing: -0.02em; }
.brand-dept { color: rgba(0,230,255,0.38); font-size: 11px; margin-top: 2px; letter-spacing: 0.03em; }
.ai-badge { display: flex; align-items: center; gap: 7px; background: rgba(0,90,130,0.15); border: 1px solid rgba(0,230,255,0.25); border-radius: 10px; padding: 5px 10px 5px 6px; cursor: pointer; position: absolute; bottom: 12px; right: 14px; z-index: 100; transition: all 0.3s ease; }
.ai-badge:hover { background: rgba(0,230,255,0.1); border-color: rgba(0,230,255,0.6); transform: translateY(-2px); }
.ai-orb { width: 30px; height: 30px; border-radius: 50%; background: #001828; border: 1px solid rgba(0,230,255,0.45); display: flex; align-items: center; justify-content: center; flex-shrink: 0; position: relative; }
.ai-orb-ring { position: absolute; width: 36px; height: 36px; border-radius: 50%; border: 1px solid rgba(0,230,255,0.15); animation: ai-pulse 2.5s ease-in-out infinite; }
@keyframes ai-pulse { 0%,100%{opacity:.2;transform:scale(1);} 50%{opacity:.7;transform:scale(1.06);} }
.ai-texts { display: flex; flex-direction: column; gap: 1px; }
.ai-status { display: flex; align-items: center; gap: 4px; }
.ai-dot { width: 4px; height: 4px; border-radius: 50%; background: #00E6FF; animation: blink 1.8s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:.25;} }
.ai-status-text { color: rgba(0,230,255,0.5); font-size: 8px; letter-spacing: 0.08em; text-transform: uppercase; }
.ai-name { color: rgba(0,230,255,0.9); font-size: 11px; font-weight: 500; letter-spacing: -0.01em; }
.modal-overlay { position: fixed; inset: 0; z-index: 200; background: rgba(0,5,15,0.82); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
.modal-overlay.open { opacity: 1; pointer-events: all; }
.aitor-wrapper { display: flex; align-items: flex-end; gap: 0; transform: scale(0.93) translateY(20px); transition: transform 0.35s cubic-bezier(0.34,1.4,0.64,1); }
.modal-overlay.open .aitor-wrapper { transform: scale(1) translateY(0); }
.modal { width: min(620px, 94vw); height: min(600px, 88vh); background: #030E1E; border: 1px solid rgba(0,230,255,0.3); border-radius: 20px 0 0 20px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 0 60px rgba(0,180,255,0.15), 0 0 120px rgba(0,80,180,0.08); order: 1; }
.modal-header { display: flex; align-items: center; gap: 12px; padding: 16px 20px; border-bottom: 1px solid rgba(0,230,255,0.1); background: rgba(0,20,40,0.6); flex-shrink: 0; }
.modal-header-orb { width: 38px; height: 38px; border-radius: 50%; background: #001828; border: 1.5px solid rgba(0,230,255,0.5); display: flex; align-items: center; justify-content: center; position: relative; }
.modal-header-ring { position: absolute; width: 46px; height: 46px; border-radius: 50%; border: 1px solid rgba(0,230,255,0.2); animation: ai-pulse 2.5s ease-in-out infinite; }
.modal-title { flex: 1; }
.modal-title h2 { color: #E0F7FF; font-size: 15px; font-weight: 600; }
.modal-title p { color: rgba(0,200,230,0.4); font-size: 11px; margin-top: 2px; }
.modal-close { width: 32px; height: 32px; border-radius: 8px; background: transparent; border: 1px solid rgba(0,230,255,0.2); color: rgba(0,230,255,0.5); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
.modal-close:hover { background: rgba(0,230,255,0.1); color: #00E6FF; border-color: rgba(0,230,255,0.5); }
.chat-area { flex: 1; overflow-y: auto; padding: 18px 20px; display: flex; flex-direction: column; gap: 14px; scrollbar-width: thin; scrollbar-color: rgba(0,230,255,0.15) transparent; }
.chat-area::-webkit-scrollbar { width: 4px; }
.chat-area::-webkit-scrollbar-thumb { background: rgba(0,230,255,0.15); border-radius: 2px; }
.msg { display: flex; gap: 10px; max-width: 88%; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg.assistant { align-self: flex-start; }
.msg-avatar { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; margin-top: 2px; }
.msg.assistant .msg-avatar { background: #001828; border: 1px solid rgba(0,230,255,0.4); }
.msg.user .msg-avatar { background: rgba(0,80,130,0.4); border: 1px solid rgba(0,230,255,0.2); }
.msg-bubble { padding: 10px 14px; border-radius: 14px; font-size: 13px; line-height: 1.6; }
.msg.assistant .msg-bubble { background: rgba(0,25,50,0.9); border: 1px solid rgba(0,230,255,0.12); color: rgba(220,245,255,0.88); border-top-left-radius: 4px; }
.msg.user .msg-bubble { background: rgba(0,80,140,0.35); border: 1px solid rgba(0,230,255,0.2); color: rgba(220,245,255,0.9); border-top-right-radius: 4px; }
.typing { display: flex; align-items: center; gap: 5px; padding: 12px 14px; }
.typing span { width: 6px; height: 6px; border-radius: 50%; background: rgba(0,230,255,0.5); animation: tdot 1.2s ease-in-out infinite; }
.typing span:nth-child(2){animation-delay:.2s;} .typing span:nth-child(3){animation-delay:.4s;}
@keyframes tdot { 0%,60%,100%{transform:translateY(0);opacity:.4;} 30%{transform:translateY(-6px);opacity:1;} }
.chat-footer { padding: 14px 16px; border-top: 1px solid rgba(0,230,255,0.1); background: rgba(0,10,25,0.6); display: flex; gap: 8px; flex-shrink: 0; align-items: flex-end; }
.chat-input { flex: 1; background: rgba(0,20,40,0.8); border: 1px solid rgba(0,230,255,0.2); border-radius: 12px; padding: 10px 14px; color: #E0F7FF; font-size: 13px; outline: none; resize: none; min-height: 44px; max-height: 120px; transition: border-color 0.2s; font-family: inherit; overflow-y: auto; }
.chat-input:focus { border-color: rgba(0,230,255,0.5); }
.chat-input::placeholder { color: rgba(0,200,230,0.22); }
.send-btn { width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0; background: rgba(0,80,130,0.35); border: 1.5px solid rgba(0,230,255,0.4); color: #00E6FF; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.send-btn:hover { background: rgba(0,230,255,0.12); border-color: #00E6FF; }
.send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.quick-btns { display: flex; flex-direction: column; gap: 6px; padding: 4px 0 8px; width: 100%; }
.quick-btn { display: flex; align-items: center; gap: 10px; padding: 9px 14px; border-radius: 10px; background: rgba(0,30,55,0.8); border: 1px solid rgba(0,230,255,0.15); color: rgba(0,210,255,0.85); font-size: 12.5px; cursor: pointer; transition: all 0.2s; text-align: left; width: 100%; }
.quick-btn:hover { background: rgba(0,100,160,0.3); border-color: rgba(0,230,255,0.5); color: #00E6FF; padding-left: 18px; }
.quick-btn .qicon { font-size: 15px; flex-shrink: 0; }
.scene { flex: 1; position: relative; z-index: 5; display: flex; align-items: center; justify-content: center; padding: 20px 20px 0; min-height: 560px; overflow: hidden; }
.orbit-svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 4; }
.hub { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); width: 114px; height: 114px; border-radius: 50%; background: rgba(1,10,22,0.92); border: 2px solid rgba(0,230,255,0.6); display: flex; align-items: center; justify-content: center; z-index: 30; }
.hp { position: absolute; border-radius: 50%; border: 1px solid rgba(0,230,255,0.15); animation: pulsar 3s ease-in-out infinite; }
@keyframes pulsar { 0%,100%{opacity:.2;transform:scale(1);} 50%{opacity:.9;transform:scale(1.07);} }
.node { position: absolute; transform: translate(-50%,-50%); display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; z-index: 20; transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1); }
.node:hover { transform: translate(-50%,-50%) scale(1.14); }
.bubble { border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: border-color 0.2s, box-shadow 0.2s; }
.node-label { font-size: 12px; font-weight: 500; text-align: center; line-height: 1.2; max-width: 80px; transition: color 0.2s; opacity: 0.55; }
.node:hover .node-label { opacity: 1; }

/* ── Colores por nodo ── */
.node[data-k="reportes"] .bubble   { border: 1.5px solid rgba(0,230,255,0.7);   box-shadow: 0 0 10px rgba(0,230,255,0.18); }
.node[data-k="cobros"] .bubble     { border: 1.5px solid rgba(29,204,132,0.7);  box-shadow: 0 0 10px rgba(29,204,132,0.18); }
.node[data-k="tareas"] .bubble     { border: 1.5px solid rgba(168,120,240,0.7); box-shadow: 0 0 10px rgba(168,120,240,0.18); }
.node[data-k="convo"] .bubble      { border: 1.5px solid rgba(58,171,240,0.7);  box-shadow: 0 0 10px rgba(58,171,240,0.18); }
.node[data-k="manuales"] .bubble   { border: 1.5px solid rgba(240,168,48,0.7);  box-shadow: 0 0 10px rgba(240,168,48,0.18); }
.node[data-k="comisiones"] .bubble { border: 1.5px solid rgba(255,100,180,0.7); box-shadow: 0 0 10px rgba(255,100,180,0.18); }

.node[data-k="reportes"] .node-label   { color: #00E6FF; }
.node[data-k="cobros"] .node-label     { color: #1dcc84; }
.node[data-k="tareas"] .node-label     { color: #a878f0; }
.node[data-k="convo"] .node-label      { color: #3aabf0; }
.node[data-k="manuales"] .node-label   { color: #f0a830; }
.node[data-k="comisiones"] .node-label { color: #ff64b4; }

.node[data-k="reportes"]:hover .bubble   { border-color: #00E6FF;  box-shadow: 0 0 22px rgba(0,230,255,0.6),  inset 0 0 18px rgba(0,200,255,0.08); }
.node[data-k="cobros"]:hover .bubble     { border-color: #1dcc84;  box-shadow: 0 0 22px rgba(29,204,132,0.6), inset 0 0 18px rgba(29,204,132,0.08); }
.node[data-k="tareas"]:hover .bubble     { border-color: #a878f0;  box-shadow: 0 0 22px rgba(168,120,240,0.6),inset 0 0 18px rgba(168,120,240,0.08); }
.node[data-k="convo"]:hover .bubble      { border-color: #3aabf0;  box-shadow: 0 0 22px rgba(58,171,240,0.6), inset 0 0 18px rgba(58,171,240,0.08); }
.node[data-k="manuales"]:hover .bubble   { border-color: #f0a830;  box-shadow: 0 0 22px rgba(240,168,48,0.6), inset 0 0 18px rgba(240,168,48,0.08); }
.node[data-k="comisiones"]:hover .bubble { border-color: #ff64b4;  box-shadow: 0 0 22px rgba(255,100,180,0.6),inset 0 0 18px rgba(255,100,180,0.08); }

/* ── Nodo Control de Gestión ── */
.node[data-k="ctrl"] { z-index: 20; }
.node[data-k="ctrl"] .ctrl-outer {
  width: 140px; height: 140px; border-radius: 50%;
  border: 1.5px solid rgba(0,255,180,0.35);
  display: flex; align-items: center; justify-content: center;
  animation: ctrl-outer-pulse 3.5s ease-in-out infinite;
  transition: border-color 0.2s;
}
.node[data-k="ctrl"] .ctrl-inner {
  width: 118px; height: 118px; border-radius: 50%;
  background: rgba(0,30,24,0.92);
  border: 2.5px solid rgba(0,255,180,0.85);
  box-shadow: 0 0 14px rgba(0,255,180,0.3), inset 0 0 12px rgba(0,255,180,0.06);
  display: flex; align-items: center; justify-content: center;
  transition: border-color 0.2s, box-shadow 0.2s;
}
@keyframes ctrl-outer-pulse {
  0%,100%{ border-color: rgba(0,255,180,0.2); transform: scale(1); }
  50%{ border-color: rgba(0,255,180,0.6); transform: scale(1.06); }
}
.node[data-k="ctrl"] .node-label { color: #00ffb4; opacity: 0.65; }
.node[data-k="ctrl"]:hover .ctrl-outer { border-color: rgba(0,255,180,0.7); }
.node[data-k="ctrl"]:hover .ctrl-inner {
  border-color: #00ffb4;
  box-shadow: 0 0 26px rgba(0,255,180,0.55), inset 0 0 18px rgba(0,255,180,0.1);
}
.node[data-k="ctrl"]:hover .node-label { opacity: 1; }

.hint { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); color: rgba(0,230,255,0.13); font-size: 11px; letter-spacing: .1em; pointer-events: none; z-index: 6; white-space: nowrap; }
@keyframes spin-cw  { from{transform:rotate(0)} to{transform:rotate(360deg)} }
@keyframes spin-ccw { from{transform:rotate(0)} to{transform:rotate(-360deg)} }
.rcw  { animation: spin-cw  80s linear infinite; transform-origin: 350px 265px; }
.rccw { animation: spin-ccw 120s linear infinite; transform-origin: 350px 265px; }
@keyframes scan { from{transform:rotate(0deg);}to{transform:rotate(360deg);} }
.scanner { animation: scan 8s linear infinite; transform-origin: 350px 265px; }
.avatar-3d-panel { order: 2; width: 180px; height: min(600px, 88vh); flex-shrink: 0; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; background: linear-gradient(180deg,rgba(0,8,20,0.0) 0%,rgba(0,8,20,0.6) 100%); border: 1px solid rgba(0,230,255,0.3); border-left: none; border-radius: 0 20px 20px 0; overflow: hidden; padding-bottom: 18px; }
.avatar-video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: top center; mix-blend-mode: screen; filter: drop-shadow(0 0 18px rgba(0,200,255,0.55)) drop-shadow(0 0 50px rgba(0,200,255,0.2)) brightness(1.12) contrast(1.05); animation: float3d 7s ease-in-out infinite; transform-origin: center bottom; }
@keyframes float3d { 0%,100%{transform:perspective(600px) rotateY(-8deg) rotateX(2deg) translateY(0px);} 30%{transform:perspective(600px) rotateY(-4deg) rotateX(1deg) translateY(-10px);} 65%{transform:perspective(600px) rotateY(-11deg) rotateX(3deg) translateY(-6px);} }
.avatar-rim { position: absolute; left: 0; top: 8%; bottom: 8%; width: 2px; background: linear-gradient(to bottom,transparent,rgba(0,230,255,0.7),rgba(0,230,255,0.3),transparent); filter: blur(2px); animation: rim-pulse 4s ease-in-out infinite; z-index: 5; }
@keyframes rim-pulse { 0%,100%{opacity:.4;} 50%{opacity:1;} }
.avatar-fade-bottom { position: absolute; bottom: 0; left: 0; right: 0; height: 120px; background: linear-gradient(to top,rgba(3,14,30,1) 0%,transparent 100%); z-index: 4; pointer-events: none; }
.avatar-platform { position: absolute; bottom: 10px; width: 100px; height: 6px; background: linear-gradient(90deg,transparent,rgba(0,230,255,0.8),transparent); filter: blur(5px); z-index: 6; animation: platform-pulse 3s ease-in-out infinite; }
@keyframes platform-pulse { 0%,100%{opacity:.5;transform:scaleX(.8);} 50%{opacity:1;transform:scaleX(1.1);} }
.avatar-shadow { position: absolute; bottom: 6px; width: 90px; height: 16px; background: radial-gradient(ellipse,rgba(0,200,255,0.3) 0%,transparent 70%); filter: blur(8px); z-index: 5; animation: shadow-pulse 7s ease-in-out infinite; }
@keyframes shadow-pulse { 0%,100%{transform:scaleX(.8);opacity:.6;} 50%{transform:scaleX(1.15);opacity:1;} }
.avatar-hud { position: absolute; top: 14px; right: 10px; background: rgba(0,5,20,0.85); border: 1px solid rgba(0,230,255,0.4); border-radius: 6px; padding: 3px 9px; font-family: 'Courier New',monospace; font-size: 9px; letter-spacing: 2px; color: rgba(0,230,255,0.9); text-shadow: 0 0 6px rgba(0,230,255,0.6); z-index: 7; }
.avatar-scanlines { position: absolute; inset: 0; background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px); pointer-events: none; z-index: 6; }
.avatar-particles { position: absolute; inset: 0; pointer-events: none; z-index: 5; overflow: hidden; }
.accesos-wrap { position: absolute; right: 0; top: 50%; transform: translateY(-50%); z-index: 40; display: flex; align-items: stretch; transition: transform 0.38s cubic-bezier(0.34,1.2,0.64,1); }
.accesos-wrap.open { transform: translateY(-50%) translateX(-210px); }
.accesos-panel { width: 210px; background: rgba(2,12,28,0.97); border: 1px solid rgba(240,168,48,0.35); border-right: none; border-radius: 14px 0 0 14px; padding: 12px 11px; display: flex; flex-direction: column; gap: 5px; opacity: 0; pointer-events: none; transition: opacity 0.22s ease; max-height: 80vh; overflow-y: auto; scrollbar-width: thin; scrollbar-color: rgba(240,168,48,0.2) transparent; }
.accesos-wrap.open .accesos-panel { opacity: 1; pointer-events: all; }
.accesos-panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; padding-bottom: 8px; border-bottom: 1px solid rgba(240,168,48,0.12); }
.accesos-panel-title { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(240,168,48,0.5); }
.accesos-add-btn { display: flex; align-items: center; background: rgba(240,168,48,0.1); border: 1px solid rgba(240,168,48,0.3); border-radius: 6px; padding: 5px 7px; color: #f0a830; cursor: pointer; font-family: inherit; transition: background 0.15s; }
.accesos-add-btn:hover { background: rgba(240,168,48,0.2); }
.acc-item { display: flex; align-items: center; gap: 7px; padding: 6px 8px; border-radius: 7px; background: rgba(240,168,48,0.04); border: 1px solid rgba(240,168,48,0.1); cursor: grab; transition: background 0.15s; }
.acc-item:hover { background: rgba(240,168,48,0.14); }
.acc-item.dragging { opacity: 0.25; cursor: grabbing; }
.acc-item.drag-over { border-color: rgba(240,168,48,0.6); background: rgba(240,168,48,0.12); }
.acc-dot { width: 5px; height: 5px; border-radius: 50%; background: #f0a830; flex-shrink: 0; }
.acc-text { font-size: 11px; color: rgba(240,168,48,0.8); flex: 1; }
.acc-loading { font-size: 11px; color: rgba(240,168,48,0.35); text-align: center; padding: 12px 0; }
.accesos-card { width: 54px; background: rgba(2,12,28,0.97); border: 1px solid rgba(240,168,48,0.45); border-radius: 14px 0 0 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; padding: 16px 8px; cursor: pointer; position: relative; transition: background 0.2s, border-color 0.2s; }
.accesos-wrap.open .accesos-card { border-radius: 0 14px 14px 0; border-left: none; border-right: 1px solid rgba(240,168,48,0.45); }
.accesos-card:hover { background: rgba(240,168,48,0.06); border-color: rgba(240,168,48,0.8); }
.acc-icon-wrap { position: relative; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; }
.acc-ring1 { position: absolute; width: 36px; height: 36px; border-radius: 50%; border: 1px solid rgba(240,168,48,0.3); animation: acc-pulse 2.5s ease-in-out infinite; }
.acc-ring2 { position: absolute; width: 46px; height: 46px; border-radius: 50%; border: 1px solid rgba(240,168,48,0.13); animation: acc-pulse 2.5s ease-in-out infinite 0.7s; }
@keyframes acc-pulse { 0%,100%{opacity:.2;transform:scale(1);} 50%{opacity:.85;transform:scale(1.09);} }
.acc-icon-inner { width: 32px; height: 32px; border-radius: 50%; background: rgba(240,168,48,0.1); border: 1px solid rgba(240,168,48,0.5); display: flex; align-items: center; justify-content: center; z-index: 2; animation: acc-glow 2.5s ease-in-out infinite; }
@keyframes acc-glow { 0%,100%{border-color:rgba(240,168,48,0.4);} 50%{border-color:rgba(240,168,48,1);} }
.acc-label { font-size: 10px; font-weight: 600; color: #f0a830; writing-mode: vertical-rl; text-orientation: mixed; transform: rotate(180deg); letter-spacing: 0.06em; line-height: 1.2; white-space: nowrap; }
.acc-modal-overlay { position: fixed; inset: 0; z-index: 300; background: rgba(0,5,15,0.85); backdrop-filter: blur(6px); display: none; align-items: center; justify-content: center; padding: 1rem; }
.acc-modal-overlay.open { display: flex; }
.acc-modal { width: min(420px,96vw); background: #030E1E; border: 1px solid rgba(240,168,48,0.4); border-radius: 18px; padding: 24px; animation: fadeUp 0.28s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
.acc-modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; padding-bottom: 14px; border-bottom: 1px solid rgba(240,168,48,0.12); }
.acc-modal-head h2 { font-size: 15px; font-weight: 600; color: #f0a830; }

      <div class="avatar-hud">SYS.ACTIVE</div>
      <button class="sound-btn" id="soundBtn" title="Activar sonido">
        <svg id="soundIconOff" width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M11 5L6 9H2v6h4l5 4V5z" stroke="#00E6FF" stroke-width="1.6" stroke-linejoin="round"/><line x1="23" y1="9" x2="17" y2="15" stroke="#00E6FF" stroke-width="1.8" stroke-linecap="round"/><line x1="17" y1="9" x2="23" y2="15" stroke="#00E6FF" stroke-width="1.8" stroke-linecap="round"/></svg>
        <svg id="soundIconOn" width="16" height="16" viewBox="0 0 24 24" fill="none" style="display:none"><path d="M11 5L6 9H2v6h4l5 4V5z" stroke="#00E6FF" stroke-width="1.6" stroke-linejoin="round"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07" stroke="#00E6FF" stroke-width="1.6" stroke-linecap="round"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14" stroke="#00E6FF" stroke-width="1.6" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- Modal Acceso -->
<div class="acc-modal-overlay" id="accModalOverlay">
  <div class="acc-modal">
    <div class="acc-modal-head">
      <h2 id="accModalTitle">Nuevo acceso</h2>
      <button class="acc-modal-close" id="accModalClose">✕</button>
    </div>
    <div class="acc-field"><label>Nombre *</label><input type="text" id="accNombre" placeholder="Nombre del acceso"></div>
    <div class="acc-field"><label>URL</label><input type="url" id="accUrl" placeholder="https://…"></div>
    <div class="acc-modal-foot">
      <button class="acc-btn-delete" id="accBtnDelete">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
        Eliminar
      </button>
      <button class="acc-btn-cancel" id="accBtnCancel">Cancelar</button>
      <button class="acc-btn-save" id="accBtnSave">Guardar</button>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const WORKER_URL   = 'https://lucky-shadow-44ed.veronica-zueras.workers.dev';
  const GEMINI_MODEL = 'gemini-2.5-flash';
  const ACC_KEY      = 'adminhub_accesos_v1';

  const SYSTEM = `Eres AITOR, el asistente de inteligencia artificial del Admin Hub de Gestión de Cobros. Ayudas al equipo con consultas sobre cobros, reportes, tareas de clientes, comisiones, manuales operativos y convocatorias.
IDIOMA: Responde siempre en español de España. Usa vocabulario y expresiones propias de España (vosotros, ordenador, móvil, etc.). Nunca uses latinismos ni expresiones de América Latina.
TONO: Directo, conciso y profesional. Sin muletillas ni frases de relleno. Prohibido usar expresiones como "con gusto", "claro que sí", "por supuesto", "desde luego", "encantado", "no hay problema", "es un placer" o similares. Ve directo al grano.
Cuando no tengas información específica sobre datos internos, orienta al usuario hacia los módulos del hub.`;

  const D = {
    reportes:   { label:'Reportes',          url:'reportes/index.html' },
    cobros:     { label:'Cobros',             url:'cobros/index.html' },
    tareas:     { label:'Tareas',             url:'seguimientos/index.html' },
    convo:      { label:"Convo '27",          url:'convo/index.html' },
    manuales:   { label:'Manuales',           url:'manuales/index.html' },
    comisiones: { label:'Comisiones',         url:'comisiones/index.html' },
    ctrl:       { label:'Control de Gestión', url:'control/index.html' }
  };

  document.querySelectorAll('.node').forEach(n => {
    n.addEventListener('click', () => {
      const d = D[n.dataset.k]; if (!d) return;
      if (d.url) { window.location.href = d.url; }
      else if (d.excelUrl) { window.open(d.excelUrl, '_blank'); }
      else { openAitor(d.prompt); }
    });
  });

  const cv = document.getElementById('bgc'), ctx = cv.getContext('2d');
  function drawBg() {
    cv.width = cv.offsetWidth; cv.height = cv.offsetHeight;
    const W = cv.width, H = cv.height; ctx.clearRect(0,0,W,H);
    for(let x=0;x<W;x+=36){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.strokeStyle='rgba(0,160,220,0.05)';ctx.lineWidth=0.5;ctx.stroke();}
    for(let y=0;y<H;y+=36){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.strokeStyle='rgba(0,160,220,0.05)';ctx.stroke();}
    for(let x=0;x<W;x+=36) for(let y=0;y<H;y+=36){ctx.beginPath();ctx.arc(x,y,0.9,0,Math.PI*2);ctx.fillStyle=Math.random()>.72?'rgba(0,230,255,0.28)':'rgba(255,255,255,0.06)';ctx.fill();}
    for(let i=0;i<90;i++){const x=Math.random()*W,y=Math.random()*H,r=Math.random()*1.1+0.15;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=Math.random()>.5?`rgba(0,220,255,${Math.random()*.35+.05})`:`rgba(255,255,255,${Math.random()*.18+.03})`;ctx.fill();}
    const hp=[{x:.06,y:.2},{x:.94,y:.2},{x:.06,y:.75},{x:.94,y:.75},{x:.12,y:.5},{x:.88,y:.5},{x:.35,y:.07},{x:.65,y:.07},{x:.35,y:.93},{x:.65,y:.93}];
    hp.forEach(h=>{const hx=h.x*W,hy=h.y*H,hs=8+Math.random()*10;ctx.beginPath();for(let i=0;i<6;i++){const a=Math.PI/3*i-Math.PI/6,px=hx+hs*Math.cos(a),py=hy+hs*Math.sin(a);i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);}ctx.closePath();ctx.strokeStyle=Math.random()>.45?'rgba(0,230,255,0.2)':'rgba(255,255,255,0.08)';ctx.lineWidth=0.8;ctx.stroke();});
    const br=22;[[22,22,1,1],[W-22,22,-1,1],[22,H-22,1,-1],[W-22,H-22,-1,-1]].forEach(([bx,by,sx,sy])=>{ctx.beginPath();ctx.moveTo(bx,by+sy*br);ctx.lineTo(bx,by);ctx.lineTo(bx+sx*br,by);ctx.strokeStyle='rgba(0,230,255,0.4)';ctx.lineWidth=1.3;ctx.stroke();});
  }
  drawBg(); window.addEventListener('resize', drawBg);

  let accesos = [], accEditIdx = null, dragAccIdx = null;
  const DEFAULTS_ACCESOS = [
    { nombre:'Bloqueo Campus', url:'' }, { nombre:'Sudokus', url:'' },
    { nombre:'Referidos', url:'' }, { nombre:'Hermes', url:'' },
    { nombre:'PayComet', url:'' }, { nombre:'Paygold', url:'' },
    { nombre:'Planner', url:'' }, { nombre:'Calendario Comisiones', url:'' },
    { nombre:'Puntuación Master', url:'' }
  ];

  async function loadAccesos() {
    try {
      const res = await fetch(`${WORKER_URL}/kv?key=${ACC_KEY}`);
      const data = await res.json();
      accesos = data.value ? JSON.parse(data.value) : JSON.parse(JSON.stringify(DEFAULTS_ACCESOS));
    } catch(e) { accesos = JSON.parse(JSON.stringify(DEFAULTS_ACCESOS)); }
    renderAccesos();
  }

  async function persistAccesos() {
    try {
      await fetch(`${WORKER_URL}/kv`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ key: ACC_KEY, value: accesos }) });
    } catch(e) { console.error('KV error:', e); }
  }

  function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function renderAccesos() {
    const list = document.getElementById('accesosListado');
    if (!accesos.length) { list.innerHTML = '<div class="acc-loading">Sin accesos todavía</div>'; return; }
    list.innerHTML = accesos.map((a, i) => `
      <div class="acc-item" draggable="true" data-i="${i}">
        <div class="acc-dot"></div>
        <span class="acc-text" style="cursor:${a.url?'pointer':'default'}" onclick="${a.url ? `window.open('${esc(a.url)}','_blank')` : ''}">${esc(a.nombre)}</span>
        <button onclick="event.stopPropagation();accOpenEdit(${i})" style="background:transparent;border:none;cursor:pointer;color:rgba(240,168,48,0.25);padding:0;display:flex;align-items:center;flex-shrink:0;transition:color 0.15s;" onmouseover="this.style.color='rgba(240,168,48,0.9)'" onmouseout="this.style.color='rgba(240,168,48,0.25)'">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>
        </button>
      </div>`).join('');

    list.querySelectorAll('.acc-item').forEach(el => {
      el.addEventListener('dragstart', e => {
        dragAccIdx = parseInt(el.dataset.i);
        setTimeout(() => el.classList.add('dragging'), 0);
        e.dataTransfer.effectAllowed = 'move';
      });
      el.addEventListener('dragend', () => {
        el.classList.remove('dragging');
        list.querySelectorAll('.acc-item').forEach(x => x.classList.remove('drag-over'));
        dragAccIdx = null;
      });
      el.addEventListener('dragover', e => {
        e.preventDefault();
        if (dragAccIdx === null) return;
        list.querySelectorAll('.acc-item').forEach(x => x.classList.remove('drag-over'));
        el.classList.add('drag-over');
      });
      el.addEventListener('drop', async e => {
        e.preventDefault();
        const targetIdx = parseInt(el.dataset.i);
        if (dragAccIdx === null || dragAccIdx === targetIdx) return;
        const moved = accesos.splice(dragAccIdx, 1)[0];
        accesos.splice(targetIdx, 0, moved);
        await persistAccesos();
        renderAccesos();
      });
    });
  }

  const accWrap = document.getElementById('accesosWrap');
  document.getElementById('accesosCard').addEventListener('click', function(e) {
    e.stopPropagation(); accWrap.classList.toggle('open');
  });
  document.addEventListener('click', function(e) {
    if (!e.target.closest('#accesosWrap') && !e.target.closest('#accModalOverlay')) accWrap.classList.remove('open');
  });

  document.getElementById('accesosAddBtn').addEventListener('click', function(e) {
    e.stopPropagation();
    accEditIdx = null;
    document.getElementById('accModalTitle').textContent = 'Nuevo acceso';
    document.getElementById('accNombre').value = '';
    document.getElementById('accUrl').value = '';
    document.getElementById('accBtnDelete').style.display = 'none';
    document.getElementById('accModalOverlay').classList.add('open');
  });

  window.accOpenEdit = function(idx) {
    accEditIdx = idx;
    const a = accesos[idx];
    document.getElementById('accModalTitle').textContent = 'Editar acceso';
    document.getElementById('accNombre').value = a.nombre;
    document.getElementById('accUrl').value = a.url || '';
    document.getElementById('accBtnDelete').style.display = 'flex';
    document.getElementById('accModalOverlay').classList.add('open');
  };

  function closeAccModal() { document.getElementById('accModalOverlay').classList.remove('open'); }
  document.getElementById('accModalClose').addEventListener('click', closeAccModal);
  document.getElementById('accBtnCancel').addEventListener('click', closeAccModal);
  document.getElementById('accModalOverlay').addEventListener('click', function(e) { if (e.target === this) closeAccModal(); });

  document.getElementById('accBtnSave').addEventListener('click', async function() {
    const nombre = document.getElementById('accNombre').value.trim();
    const url = document.getElementById('accUrl').value.trim();
    if (!nombre) { alert('El nombre es obligatorio.'); return; }
    const obj = { nombre, url };
    if (accEditIdx !== null) accesos[accEditIdx] = obj; else accesos.unshift(obj);
    await persistAccesos(); closeAccModal(); renderAccesos();
  });

  document.getElementById('accBtnDelete').addEventListener('click', async function() {
    if (accEditIdx === null) return;
    if (!confirm(`¿Eliminar "${accesos[accEditIdx].nombre}"?`)) return;
    accesos.splice(accEditIdx, 1);
    await persistAccesos(); closeAccModal(); renderAccesos();
  });

  loadAccesos();

  let messages = [];
  const modal = document.getElementById('aitorModal');
  const chatArea = document.getElementById('chatArea');
  const chatInput = document.getElementById('chatInput');
  const sendBtn = document.getElementById('sendBtn');

  document.getElementById('aitorBadge').addEventListener('click', () => openModal());
  document.getElementById('modalClose').addEventListener('click', closeModal);
  modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });

  function openModal(prompt) {
    modal.classList.add('open');
    const v = document.getElementById('avatarVideo');
    if (v) { v.muted=false; v.currentTime=0; v.play().catch(()=>{ v.muted=true; v.play(); }); }
    spawnParticles();
    if (messages.length === 0) { appendMsg('model', 'Hola! Soy **AITOR**, tu asistente de Gestión de Cobros. ¿En qué puedo ayudarte?'); appendQuickButtons(); }
    if (prompt) setTimeout(() => { chatInput.value = prompt; sendMessage(); }, 350);
    else setTimeout(() => chatInput.focus(), 150);
  }
  function closeModal() { modal.classList.remove('open'); }
  function openAitor(prompt) { openModal(prompt); }

  document.addEventListener('mousemove', e => {
    if (!modal.classList.contains('open')) return;
    const v = document.getElementById('avatarVideo'); if (!v) return;
    const cx = window.innerWidth/2, cy = window.innerHeight/2;
    const dx = (e.clientX-cx)/cx, dy = (e.clientY-cy)/cy;
    v.style.transform = `perspective(700px) rotateY(${-8+dx*5}deg) rotateX(${2-dy*3}deg)`;
    v.style.transition = 'transform 0.08s ease';
  });

  function spawnParticles() {
    const c = document.getElementById('avatarParticles'); c.innerHTML = '';
    for (let i=0; i<14; i++) {
      const p = document.createElement('div'); p.className = 'av-particle';
      p.style.left = Math.random()*100+'%'; p.style.animationDuration = (3+Math.random()*6)+'s';
      p.style.animationDelay = (Math.random()*5)+'s'; p.style.width = p.style.height = (1+Math.random()*2)+'px';
      c.appendChild(p);
    }
  }

  async function sendMessage() {
    const text = chatInput.value.trim(); if (!text) return;
    chatInput.value = ''; autoResize(); sendBtn.disabled = true;
    appendMsg('user', text); messages.push({ role:'user', parts:[{text}] });
    const typing = appendTyping();
    const MAX_RETRIES = 3; let lastError = null;
    for (let attempt = 1; attempt <= MAX_RETRIES; attempt++) {
      try {
        if (attempt > 1) {
          const tb = typing.querySelector('.msg-bubble');
          if (tb) tb.innerHTML = `<em style="color:rgba(0,200,255,0.55);font-size:12px;">⏳ Un momento, reintentando… (${attempt}/${MAX_RETRIES})</em>`;
          await new Promise(r => setTimeout(r, 1200 * attempt));
        }
        const res = await fetch(WORKER_URL, { method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ model: GEMINI_MODEL, contents: [
            { role:'user', parts:[{text:SYSTEM}] },
            { role:'model', parts:[{text:'Entendido, soy AITOR y estoy listo para ayudar.'}] },
            ...messages.slice(-12)
          ], generationConfig: { maxOutputTokens:1024, temperature:0.7 } })
        });
        const data = await res.json();
        if (data.error) {
          const msg = data.error.message || '';
          const isOverload = msg.toLowerCase().includes('high demand') || msg.includes('RESOURCE_EXHAUSTED') || msg.includes('overloaded');
          if (isOverload && attempt < MAX_RETRIES) { lastError = msg; continue; }
          throw new Error(msg);
        }
        typing.remove();
        const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || '(sin respuesta)';
        messages.push({ role:'model', parts:[{text:reply}] }); appendMsg('model', reply); lastError = null; break;
      } catch(err) {
        lastError = err.message;
        if (attempt === MAX_RETRIES) {
          typing.remove();
          const isOverload = lastError.toLowerCase().includes('high demand') || lastError.includes('RESOURCE_EXHAUSTED') || lastError.includes('overloaded') || lastError.toLowerCase().includes('quota');
          if (isOverload) appendMsg('model', '⏳ AITOR está procesando muchas solicitudes ahora mismo. Por favor, inténtalo de nuevo en unos segundos.');
          else appendMsg('model', `No he podido conectar con AITOR en este momento. Inténtalo de nuevo. _(${lastError})_`);
        }
      }
    }
    sendBtn.disabled = false; chatInput.focus();
  }

  sendBtn.addEventListener('click', sendMessage);
  chatInput.addEventListener('keydown', e => { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
  chatInput.addEventListener('input', autoResize);
  function autoResize() { chatInput.style.height='auto'; chatInput.style.height=Math.min(chatInput.scrollHeight,120)+'px'; }

  const AI_AV = '<svg width="13" height="13" viewBox="0 0 60 75" fill="none"><path d="M6 12C6 12 15 3 27 9C33 12 36 21 36 30C36 39 33 48 27 51C21 54 12 51 9 45C6 39 6 30 6 30" stroke="#22D3EE" stroke-width="2.5"/><circle cx="24" cy="30" r="4" fill="#22D3EE"/></svg>';
  const US_AV = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="rgba(0,230,255,0.7)" stroke-width="1.5"/><path d="M4 20c0-4.4 3.6-8 8-8s8 3.6 8 8" stroke="rgba(0,230,255,0.7)" stroke-width="1.5" stroke-linecap="round"/></svg>';

  function appendMsg(role, text) {
    const div = document.createElement('div');
    const cr = (role==='model') ? 'assistant' : 'user'; div.className = `msg ${cr}`;
    const html = text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
    const av = (cr==='user') ? US_AV : AI_AV;
    div.innerHTML = `<div class="msg-avatar">${av}</div><div class="msg-bubble">${html}</div>`;
    chatArea.appendChild(div); chatArea.scrollTop = chatArea.scrollHeight; return div;
  }

  const QUICK_BTNS = [
    {icon:'📊', label:'Ver reportes del mes'},{icon:'💰', label:'Cobros pendientes'},
    {icon:'🎓', label:'Buscar Alumno'},{icon:'📈', label:'Histórico de Comisiones'},
    {icon:'🏅', label:'Becas'},{icon:'📋', label:'Búsqueda rápida en manuales'},
    {icon:'✅', label:'Tareas pendientes de ADMC'},
  ];
  function appendQuickButtons() {
    const wrap2 = document.createElement('div'); wrap2.className='quick-btns'; wrap2.id='quickBtns';
    QUICK_BTNS.forEach(b => {
      const btn = document.createElement('button'); btn.className='quick-btn';
      btn.innerHTML = `<span class="qicon">${b.icon}</span>${b.label}`;
      btn.addEventListener('click', () => { wrap2.remove(); chatInput.value=b.label; sendMessage(); });
      wrap2.appendChild(btn);
    });
    chatArea.appendChild(wrap2); chatArea.scrollTop = chatArea.scrollHeight;
  }

  function appendTyping() {
    const div = document.createElement('div'); div.className='msg assistant';
    div.innerHTML = `<div class="msg-avatar">${AI_AV}</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
    chatArea.appendChild(div); chatArea.scrollTop = chatArea.scrollHeight; return div;
  }
});
</script>
</body>
</html>
