<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Hub - AIThor Protected</title>
<style>
/* Estilos base para que se vea idéntico al original */
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #010409; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; font-family: sans-serif; }
.wrap { background: #020B18; border-radius: 20px; width: 95vw; height: 90vh; max-width: 1200px; position: relative; overflow: hidden; border: 1px solid rgba(0,230,255,0.1); display: flex; flex-direction: column; }
.bg-canvas { position: absolute; inset: 0; z-index: 0; pointer-events: none; }

/* Topbar */
.topbar { position: relative; z-index: 20; padding: 22px 28px; display: flex; align-items: center; gap: 12px; }
.brand-sq { width: 40px; height: 40px; border-radius: 11px; background: #003A5C; border: 1px solid rgba(0,230,255,0.4); display: flex; align-items: center; justify-content: center; }
.brand-name { color: #fff; font-size: 17px; font-weight: 500; }
.brand-dept { color: rgba(0,230,255,0.38); font-size: 11px; }

/* Escena y Nodos */
.scene { flex: 1; position: relative; z-index: 5; display: flex; align-items: center; justify-content: center; }
.orbit-svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
.hub { position: absolute; width: 114px; height: 114px; border-radius: 50%; background: rgba(1,10,22,0.92); border: 2px solid rgba(0,230,255,0.6); display: flex; align-items: center; justify-content: center; z-index: 30; }
.node { position: absolute; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; z-index: 20; transition: transform 0.28s; }
.node:hover { transform: translate(-50%, -50%) scale(1.1); }
.bubble { border-radius: 50%; width: 70px; height: 70px; display: flex; align-items: center; justify-content: center; border: 1.5px solid rgba(0,230,255,0.15); transition: 0.2s; }
.node:hover .bubble { border-color: #00E6FF; }
.node-label { font-size: 11px; color: rgba(0,200,230,0.5); }

/* Panel Inferior */
.detail { padding: 20px 28px; background: rgba(0,6,18,0.85); border-top: 1px solid rgba(0,230,255,0.1); display: flex; align-items: center; gap: 20px; z-index: 20; transition: 0.3s; }
.detail.off { opacity: 0; pointer-events: none; transform: translateY(20px); }
.d-title { color: #E0F7FF; font-size: 18px; margin-bottom: 4px; }
.d-desc { color: rgba(0,230,255,0.4); font-size: 12px; max-width: 500px; }
.d-cta { margin-left: auto; padding: 10px 20px; border-radius: 8px; background: transparent; border: 1px solid #00E6FF; color: #00E6FF; cursor: pointer; }

/* AIThor Chat */
.aithor-btn { position: fixed; bottom: 24px; right: 24px; z-index: 1000; cursor: pointer; text-align: center; }
.aithor-orb { width: 60px; height: 60px; border-radius: 50%; background: radial-gradient(circle, #3B0764, #1E0533); border: 2px solid #A855F7; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px rgba(168,85,247,0.4); animation: float 3s infinite ease-in-out; }
@keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

.aithor-panel { position: fixed; bottom: 100px; right: 24px; width: 340px; height: 450px; background: #040D1C; border: 1px solid rgba(168,85,247,0.3); border-radius: 16px; display: flex; flex-direction: column; z-index: 999; transition: 0.3s; box-shadow: 0 10px 40px rgba(0,0,0,0.7); }
.hidden { opacity: 0; pointer-events: none; transform: scale(0.9); }
.chat-header { padding: 12px; background: #1a0633; display: flex; justify-content: space-between; align-items: center; color: white; font-size: 14px; }
.chat-msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
.m { padding: 8px 12px; border-radius: 10px; font-size: 13px; max-width: 80%; }
.m.bot { background: rgba(0,40,70,0.6); color: #00E6FF; align-self: flex-start; }
.m.user { background: rgba(60,10,100,0.5); color: #F3E8FF; align-self: flex-end; }
.chat-input { padding: 10px; display: flex; gap: 5px; background: #02060F; }
.chat-input input { flex: 1; background: #111; border: 1px solid #333; color: white; padding: 8px; border-radius: 5px; outline: none; }
.chat-input button { background: #581C87; color: white; border: none; padding: 0 12px; border-radius: 5px; cursor: pointer; }

/* Animaciones Scanner */
.scanner { animation: rotate 10s linear infinite; transform-origin: 350px 265px; }
@keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="wrap">
    <canvas class="bg-canvas" id="bgc"></canvas>
    
    <div class="topbar">
        <div class="brand-sq">
            <svg width="20" height="20" fill="#00E6FF"><rect x="2" y="2" width="7" height="7" rx="1"/><rect x="11" y="2" width="7" height="7" rx="1"/><rect x="2" y="11" width="7" height="7" rx="1"/></svg>
        </div>
        <div>
            <div class="brand-name">Admin Hub</div>
            <div class="brand-dept">Gestión Cobros</div>
        </div>
    </div>

    <div class="scene" id="scene">
        <svg class="orbit-svg" viewBox="0 0 700 530">
            <circle cx="350" cy="265" r="240" fill="none" stroke="rgba(0,230,255,0.05)" />
            <line class="scanner" x1="350" y1="265" x2="350" y2="40" stroke="rgba(0,230,255,0.2)" stroke-width="2" />
        </svg>

        <div class="hub">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#00E6FF" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        </div>

        <div class="node" style="left:50%; top:15%;" data-k="reportes">
            <div class="bubble"><svg width="24" height="24" stroke="#00E6FF" fill="none"><path d="M3 20l7-10 6 5 6-11"/></svg></div>
            <span class="node-label">Reportes</span>
        </div>
        <div class="node" style="left:80%; top:35%;" data-k="cobros">
            <div class="bubble"><svg width="24" height="24" stroke="#00CFCF" fill="none"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></div>
            <span class="node-label">Cobros</span>
        </div>
        <div class="node" style="left:80%; top:65%;" data-k="check">
            <div class="bubble"><svg width="24" height="24" stroke="#00E6FF" fill="none"><path d="M20 6L9 17l-5-5"/></svg></div>
            <span class="node-label">Check</span>
        </div>
        <div class="node" style="left:50%; top:85%;" data-k="seguimientos">
            <div class="bubble"><svg width="24" height="24" stroke="#5DADE2" fill="none"><circle cx="12" cy="7" r="4"/><path d="M4 21v-2a4 4 0 014-4h8a4 4 0 014 4v2"/></svg></div>
            <span class="node-label">Seguimientos</span>
        </div>
        <div class="node" style="left:20%; top:65%;" data-k="manuales">
            <div class="bubble"><svg width="24" height="24" stroke="#22D3EE" fill="none"><path d="M4 4h16v16H4zM4 9h16M9 4v16"/></svg></div>
            <span class="node-label">Manuales</span>
        </div>
        <div class="node" style="left:20%; top:35%;" data-k="comisiones">
            <div class="bubble"><svg width="24" height="24" stroke="#40C8E0" fill="none"><path d="M12 1v22M5 5l14 14M19 5L5 19"/></svg></div>
            <span class="node-label">Comisiones</span>
        </div>
    </div>

    <div class="detail off" id="panel">
        <div>
            <div class="d-title" id="d-title">Selecciona un módulo</div>
            <div class="d-desc" id="d-desc">AIThor está listo para analizar los datos operativos.</div>
        </div>
        <button class="d-cta" id="d-cta">Consultar a AIThor</button>
    </div>
</div>

<div class="aithor-btn" id="aiBtn">
    <div class="aithor-orb">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zM12 6v4M12 14v4M8 12h8"/></svg>
    </div>
    <span style="color:#A855F7; font-size:9px; font-weight:bold; margin-top:5px;">AITHOR</span>
</div>

<div class="aithor-panel hidden" id="aiPanel">
    <div class="chat-header">
        <span>AIThor Intelligence</span>
        <span style="cursor:pointer" onclick="document.getElementById('aiPanel').classList.add('hidden')">✕</span>
    </div>
    <div class="chat-msgs" id="aiMsgs">
        <div class="m bot">Núcleo activo. Por favor, asegúrate de haber introducido tu API Key de Gemini.</div>
    </div>
    <div class="chat-input">
        <input type="text" id="aiInput" placeholder="Pregunta algo...">
        <button id="sendBtn">➤</button>
    </div>
</div>

<script>
// --- SEGURIDAD DE LA API ---
let API_KEY = sessionStorage.getItem('ai_token');

if (!API_KEY) {
    API_KEY = prompt("🔐 SEGURIDAD: Introduce tu clave de API de Gemini para activar a AIThor:");
    if (API_KEY) sessionStorage.setItem('ai_token', API_KEY);
}

const D = {
    reportes: { title: "Reportes Operativos", desc: "Análisis financiero y dashboards de rendimiento.", prompt: "Genera un resumen de los indicadores clave para los reportes de cobro." },
    cobros: { title: "Gestión de Cobros", desc: "Pipeline de facturación y reclamación activa.", prompt: "¿Cómo puedo optimizar el pipeline de cobros este mes?" },
    check: { title: "Control de Calidad", desc: "Validación de expedientes y procesos.", prompt: "¿Qué puntos críticos debo revisar en el proceso de Check?" },
    seguimientos: { title: "Seguimiento Cliente", desc: "Historial de contactos y próximas acciones.", prompt: "¿Cómo mejorar el seguimiento de clientes morosos?" },
    manuales: { title: "Base de Conocimiento", desc: "Manuales y guías de procedimiento interno.", prompt: "Resúmeme la importancia de tener manuales actualizados en cobros." },
    comisiones: { title: "Cálculo Comisiones", desc: "Liquidaciones y estructuras de incentivos.", prompt: "¿Qué modelos de comisiones son más efectivos para gestores de cobro?" }
};

// Interacción Hub
document.querySelectorAll('.node').forEach(n => {
    n.onclick = () => {
        const d = D[n.dataset.k];
        document.getElementById('panel').classList.remove('off');
        document.getElementById('d-title').innerText = d.title;
        document.getElementById('d-desc').innerText = d.desc;
        document.getElementById('d-cta').onclick = () => callAI(d.prompt);
    };
});

// Lógica Chat
const aiPanel = document.getElementById('aiPanel');
const aiMsgs = document.getElementById('aiMsgs');
const aiInput = document.getElementById('aiInput');

document.getElementById('aiBtn').onclick = () => aiPanel.classList.toggle('hidden');

async function callAI(text) {
    if (!text || !API_KEY) return;
    aiPanel.classList.remove('hidden');
    addMsg(text, 'user');
    aiInput.value = '';

    const tempMsg = addMsg("AIThor está pensando...", "bot");

    try {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ contents: [{ parts: [{ text: `Eres AIThor, asistente de cobros. Responde breve: ${text}` }] }] })
        });
        const data = await res.json();
        tempMsg.innerText = data.candidates[0].content.parts[0].text;
    } catch (e) {
        tempMsg.innerText = "Error: Verifica que tu API Key sea correcta y tenga permisos para Gemini.";
    }
}

function addMsg(txt, side) {
    const div = document.createElement('div');
    div.className = `m ${side}`;
    div.innerText = txt;
    aiMsgs.appendChild(div);
    aiMsgs.scrollTop = aiMsgs.scrollHeight;
    return div;
}

document.getElementById('sendBtn').onclick = () => callAI(aiInput.value);
aiInput.onkeypress = (e) => { if(e.key === 'Enter') callAI(aiInput.value); };

// Fondo Canvas
const cv = document.getElementById('bgc');
const ctx = cv.getContext('2d');
function draw() {
    cv.width = window.innerWidth; cv.height = window.innerHeight;
    ctx.strokeStyle = 'rgba(0,230,255,0.05)';
    for(let i=0; i<cv.width; i+=40) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,cv.height); ctx.stroke(); }
    for(let i=0; i<cv.height; i+=40) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(cv.width,i); ctx.stroke(); }
}
