<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convo '27 — Admin Hub</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #041C2E;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  color: #E0F7FF;
  min-height: 100vh;
}
.bg-overlay { position: fixed; inset: 0; z-index: 0; pointer-events: none; background: radial-gradient(circle at center, rgba(0,60,110,0.45) 0%, rgba(4,28,46,0.85) 60%, #041C2E 100%); }
canvas#bgc { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
.corner { position: fixed; width: 28px; height: 28px; z-index: 5; pointer-events: none; }
.corner.tl { top:14px; left:14px; border-top:1.5px solid rgba(0,212,240,0.35); border-left:1.5px solid rgba(0,212,240,0.35); }
.corner.tr { top:14px; right:14px; border-top:1.5px solid rgba(0,212,240,0.35); border-right:1.5px solid rgba(0,212,240,0.35); }
.corner.bl { bottom:14px; left:14px; border-bottom:1.5px solid rgba(0,212,240,0.35); border-left:1.5px solid rgba(0,212,240,0.35); }
.corner.br { bottom:14px; right:14px; border-bottom:1.5px solid rgba(0,212,240,0.35); border-right:1.5px solid rgba(0,212,240,0.35); }
.sys-tag { position:fixed; bottom:18px; left:50%; transform:translateX(-50%); font-family:'Courier New',monospace; font-size:9px; letter-spacing:0.14em; color:rgba(0,200,255,0.15); z-index:5; pointer-events:none; white-space:nowrap; }

/* Topbar */
.topbar { position:relative; z-index:20; padding:20px 28px 16px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid rgba(0,212,240,0.08); }
.brand { display:flex; align-items:center; gap:12px; }
.brand-sq { width:40px; height:40px; border-radius:11px; background:#003A5C; border:1px solid rgba(0,212,240,0.4); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.brand-name { color:#fff; font-size:17px; font-weight:500; letter-spacing:-0.02em; }
.brand-dept { color:rgba(0,212,240,0.38); font-size:11px; margin-top:2px; letter-spacing:0.03em; }
.back-btn { display:flex; align-items:center; gap:7px; background:rgba(0,90,130,0.15); border:1px solid rgba(0,212,240,0.25); border-radius:10px; padding:7px 14px; color:rgba(0,212,240,0.8); font-size:12px; cursor:pointer; text-decoration:none; transition:all 0.2s; }
.back-btn:hover { background:rgba(0,212,240,0.1); border-color:rgba(0,212,240,0.6); color:#00D4F0; }

/* Page head */
.page-head { position:relative; z-index:10; padding:26px 32px 16px; text-align:center; display:flex; flex-direction:column; align-items:center; }
.page-eyebrow { font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:rgba(0,212,240,0.35); margin-bottom:6px; display:flex; align-items:center; gap:6px; justify-content:center; }
.page-eyebrow::before { content:''; display:inline-block; width:18px; height:1px; background:rgba(0,212,240,0.3); }
.page-title { font-size:26px; font-weight:600; letter-spacing:-0.03em; color:#E0F7FF; display:flex; align-items:center; gap:12px; }
.page-title svg { filter:drop-shadow(0 0 8px rgba(0,212,240,0.5)); }
.page-sub { color:rgba(0,200,230,0.35); font-size:12px; margin-top:5px; }

/* Nodes */
.nodes-area { position:relative; z-index:10; padding:32px 32px 0; display:flex; justify-content:center; align-items:center; min-height:240px; }
.connector-svg { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; z-index:0; }
.nodes-row { position:relative; z-index:2; display:flex; justify-content:center; gap:64px; flex-wrap:wrap; }
.node { display:flex; flex-direction:column; align-items:center; gap:12px; cursor:pointer; transition:transform 0.28s cubic-bezier(0.34,1.56,0.64,1); position:relative; }
.node:hover { transform:scale(1.1); }
.node.active { transform:scale(1.08); }
.bubble { width:108px; height:108px; border-radius:50%; background:rgba(3,10,20,0.92); border:1.5px solid rgba(0,212,240,0.15); display:flex; align-items:center; justify-content:center; position:relative; transition:border-color 0.2s, box-shadow 0.2s, background 0.2s; box-shadow:inset 0 0 22px rgba(0,80,140,0.1); }
.node:hover .bubble { border-color:rgba(0,212,240,0.6); box-shadow:0 0 22px rgba(0,212,240,0.14), inset 0 0 22px rgba(0,100,160,0.12); }
.node.active .bubble { border-color:rgba(0,212,240,0.72); background:rgba(0,38,62,0.95); box-shadow:0 0 26px rgba(0,212,240,0.2), inset 0 0 24px rgba(0,180,255,0.07); }
.node.active .bubble::after { content:''; position:absolute; width:106px; height:106px; border-radius:50%; border:1px solid rgba(0,212,240,0.18); animation:node-pulse 2.5s ease-in-out infinite; }
@keyframes node-pulse { 0%,100%{opacity:.2;transform:scale(1);} 50%{opacity:.75;transform:scale(1.07);} }
.status-badge { position:absolute; bottom:-2px; right:-2px; width:22px; height:22px; border-radius:50%; border:2.5px solid #041C2E; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; }
.badge-ok   { background:#16a96b; color:#fff; }
.badge-warn { background:#d9911a; color:#fff; }
.badge-pend { background:#534AB7; color:#fff; }
.node-label { font-size:12px; font-weight:500; color:rgba(0,190,220,0.45); text-align:center; line-height:1.3; max-width:100px; transition:color 0.2s; }
.node:hover .node-label, .node.active .node-label { color:#00D4F0; }

.divider { position:relative; z-index:10; margin:28px 32px 0; height:1px; background:rgba(0,212,240,0.07); }

/* Section header */
.section-header { position:relative; z-index:10; padding:20px 32px 0; display:flex; align-items:center; justify-content:space-between; }
.section-title { font-size:10px; letter-spacing:0.16em; text-transform:uppercase; color:rgba(0,212,240,0.4); display:flex; align-items:center; gap:8px; }
.section-title::before { content:''; display:inline-block; width:18px; height:1px; background:rgba(0,212,240,0.3); }
.edit-corner-btn { display:flex; align-items:center; gap:6px; background:rgba(0,80,130,0.2); border:1px solid rgba(0,212,240,0.3); border-radius:9px; padding:7px 14px; color:rgba(0,212,240,0.7); font-size:12px; cursor:pointer; transition:all 0.2s; font-family:inherit; }
.edit-corner-btn:hover { background:rgba(0,212,240,0.1); border-color:#00D4F0; color:#00D4F0; }

/* Brands grid */
.brands-grid { position:relative; z-index:10; padding:16px 32px 60px; display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
.brand-card { background:rgba(0,16,32,0.85); border:1px solid rgba(0,212,240,0.1); border-radius:13px; padding:16px 18px; display:flex; flex-direction:column; gap:0; transition:border-color 0.2s, transform 0.2s; animation:fadeUp 0.4s ease both; }
.brand-card:hover { border-color:rgba(0,212,240,0.25); transform:translateY(-2px); }
@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
.brand-card::before { content:''; display:block; height:2px; border-radius:2px; margin-bottom:12px; }
.brand-card.obs::before     { background:linear-gradient(90deg,#1dcc84,transparent); }
.brand-card.inesdi::before { background:linear-gradient(90deg,#a878f0,transparent); }
.brand-card.esdesign::before { background:linear-gradient(90deg,#f0a830,transparent); }
.brand-card.ucma::before    { background:linear-gradient(90deg,#3aabf0,transparent); }
.brand-name-badge { font-size:18px; font-weight:700; letter-spacing:-0.02em; margin-bottom:12px; display:block; }
.brand-card.obs .brand-name-badge     { color:#1dcc84; }
.brand-card.inesdi .brand-name-badge { color:#a878f0; }
.brand-card.esdesign .brand-name-badge { color:#f0a830; }
.brand-card.ucma .brand-name-badge    { color:#3aabf0; }
.date-row { display:flex; flex-direction:column; gap:7px; }
.date-item { display:flex; flex-direction:column; gap:2px; padding:7px 9px; background:rgba(0,30,55,0.6); border-radius:7px; border:1px solid rgba(0,212,240,0.07); }
.date-lbl { font-size:11px; letter-spacing:0.04em; text-transform:uppercase; color:rgba(0,200,240,0.65); font-weight:500; }
.date-val { font-size:12px; font-weight:500; color:rgba(220,245,255,0.75); font-family:'Courier New',monospace; }
.days-left { display:inline-block; margin-top:3px; font-size:9px; padding:2px 6px; border-radius:4px; font-weight:600; }
.days-left.soon { background:rgba(240,168,48,0.15); color:#f0a830; border:1px solid rgba(240,168,48,0.25); }
.days-left.ok    { background:rgba(29,204,132,0.12); color:#1dcc84; border:1px solid rgba(29,204,132,0.2); }
.days-left.past { background:rgba(90,90,110,0.2); color:rgba(180,200,220,0.4); border:1px solid rgba(90,90,110,0.3); }

/* Loading */
.loading-state { text-align:center; padding:3rem 1rem; color:rgba(0,200,230,0.28); grid-column:1/-1; }
.loading-dots { display:inline-flex; gap:6px; margin-bottom:12px; }
.loading-dots span { width:6px; height:6px; border-radius:50%; background:rgba(0,212,240,0.4); animation:ldot 1.2s ease-in-out infinite; }
.loading-dots span:nth-child(2){animation-delay:.2s;} .loading-dots span:nth-child(3){animation-delay:.4s;}
@keyframes ldot { 0%,60%,100%{transform:translateY(0);opacity:.4;} 30%{transform:translateY(-6px);opacity:1;} }

/* Modal */
.overlay { position:fixed; inset:0; z-index:200; background:rgba(0,5,15,0.85); backdrop-filter:blur(6px); display:none; align-items:center; justify-content:center; padding:1rem; }
.overlay.open { display:flex; }
.modal { width:min(560px,96vw); max-height:90vh; overflow-y:auto; background:#030E1E; border:1px solid rgba(0,212,240,0.3); border-radius:18px; padding:24px; box-shadow:0 0 60px rgba(0,180,255,0.12); animation:fadeUp 0.28s ease; }
.modal-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; padding-bottom:14px; border-bottom:1px solid rgba(0,212,240,0.1); }
.modal-head h2 { font-size:15px; font-weight:600; color:#E0F7FF; display:flex; align-items:center; gap:8px; }
.modal-close { width:30px; height:30px; border-radius:8px; background:transparent; border:1px solid rgba(0,212,240,0.2); color:rgba(0,212,240,0.5); font-size:15px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s; font-family:inherit; }
.modal-close:hover { background:rgba(0,212,240,0.1); color:#00D4F0; border-color:rgba(0,212,240,0.5); }

@media(max-width:700px){
  .topbar,.page-head,.section-header,.brands-grid { padding-left:16px; padding-right:16px; }
  .nodes-row { gap:28px; }
  .bubble { width:82px; height:82px; }
  .brands-grid { grid-template-columns:repeat(2,1fr); }
}
</style>
</head>
<body>

<div class="bg-overlay"></div>
<canvas id="bgc"></canvas>
<div class="corner tl"></div><div class="corner tr"></div>
<div class="corner bl"></div><div class="corner br"></div>
<div class="sys-tag">SYS.CONVO27 v1.1 · FILTRO.ACTIVO</div>

<div class="topbar">
  <div class="brand">
    <div class="brand-sq">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <rect x="2" y="2" width="7" height="7" rx="1.5" fill="#00D4F0"/>
        <rect x="11" y="2" width="7" height="7" rx="1.5" fill="#00D4F0"/>
        <rect x="2" y="11" width="7" height="7" rx="1.5" fill="#00D4F0"/>
        <rect x="11" y="11" width="7" height="7" rx="1.5" fill="rgba(0,212,240,0.28)"/>
      </svg>
    </div>
    <div>
      <div class="brand-name">Admin Hub</div>
      <div class="brand-dept">Gestión Cobros</div>
    </div>
  </div>
  <a href="../index.html" class="back-btn">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
    Volver al Hub
  </a>
</div>

<div class="page-head">
  <div class="page-eyebrow">módulo · convocatoria</div>
  <div class="page-title">
    <svg width="26" height="26" viewBox="0 0 30 30" fill="none">
      <circle cx="15" cy="11" r="5.5" stroke="#5DADE2" stroke-width="1.7"/>
      <path d="M4 27c0-6.075 4.925-11 11-11s11 4.925 11 11" stroke="#5DADE2" stroke-width="1.7" stroke-linecap="round"/>
      <circle cx="23" cy="22" r="4" fill="#041C2E" stroke="#5DADE2" stroke-width="1.4"/>
      <path d="M21.5 22h3M23 20.5v3" stroke="#5DADE2" stroke-width="1.2" stroke-linecap="round"/>
    </svg>
    Convo '27
  </div>
  <div class="page-sub">Detector de formato: ID, NACS, Nombres y Apellidos</div>
</div>

<div class="nodes-area">
  <svg class="connector-svg" viewBox="0 0 900 260" preserveAspectRatio="xMidYMid meet">
    <circle cx="450" cy="130" r="110" fill="none" stroke="rgba(0,180,220,0.04)" stroke-width="1"/>
  </svg>

  <div class="nodes-row">
    <div class="node active" id="drop-zone" onclick="document.getElementById('file-input').click()">
      <div class="bubble" id="bubble-check">
        <div class="status-badge badge-pend">⊙</div>
        <svg width="38" height="38" viewBox="0 0 38 38" fill="none">
          <path d="M19 6l2.5 7.5H29l-6.5 4.5 2.5 7.5L19 21l-6 4.5 2.5-7.5L9 13.5h7.5z" stroke="#a878f0" stroke-width="1.6" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="node-label" id="check-label">Herramienta Check</span>
      <input type="file" id="file-input" style="display:none" accept=".xlsx, .xls">
    </div>

    <div class="node" onclick="setActive(this)">
      <div class="bubble">
        <div class="status-badge badge-ok">✓</div>
        <svg width="38" height="38" viewBox="0 0 38 38" fill="none">
          <rect x="7" y="6" width="24" height="26" rx="3" stroke="#00D4F0" stroke-width="1.6"/>
          <path d="M14 19h10M19 14v10" stroke="#00D4F0" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="node-label">Nuevo Convo</span>
    </div>
  </div>
</div>

<div class="divider"></div>

<div class="section-header">
  <div class="section-title">Fechas clave</div>
</div>

<div class="brands-grid" id="brandsGrid">
  <div class="loading-state" style="grid-column:1/-1">
    <div class="loading-dots"><span></span><span></span><span></span></div>
    <p>Sincronizando datos…</p>
  </div>
</div>

<script>
// --- FONDO ANIMADO ---
const cv = document.getElementById('bgc'), ctx = cv.getContext('2d');
function drawBg() {
  cv.width = window.innerWidth; cv.height = window.innerHeight;
  const W = cv.width, H = cv.height;
  ctx.clearRect(0,0,W,H);
  for(let x=0;x<W;x+=36){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.strokeStyle='rgba(0,160,220,0.07)';ctx.lineWidth=.5;ctx.stroke();}
  for(let y=0;y<H;y+=36){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.strokeStyle='rgba(0,160,220,0.07)';ctx.stroke();}
}
drawBg(); window.addEventListener('resize', drawBg);

function setActive(el) {
  document.querySelectorAll('.node').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
}

// --- LÓGICA DE PROCESAMIENTO EXCEL (SOLO COLUMNAS ESPECÍFICAS) ---
const dropZone = document.getElementById('drop-zone');
const bubble = document.getElementById('bubble-check');
const fileInput = document.getElementById('file-input');
const checkLabel = document.getElementById('check-label');

// Columnas exactas que buscamos
const COLUMNAS_DIANA = ["ID OPORTUNIDAD", "ID NACS", "NOMBRES", "APELLIDOS"];

['dragenter', 'dragover'].forEach(name => {
    dropZone.addEventListener(name, (e) => {
        e.preventDefault();
        bubble.style.borderColor = "#ffff00";
        bubble.style.boxShadow = "0 0 30px rgba(255, 255, 0, 0.4)";
    });
});

['dragleave', 'drop'].forEach(name => {
    dropZone.addEventListener(name, (e) => {
        e.preventDefault();
        bubble.style.borderColor = "";
        bubble.style.boxShadow = "";
    });
});

dropZone.addEventListener('drop', (e) => handleFile(e.dataTransfer.files[0]));
fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));

async function handleFile(file) {
    if (!file) return;
    
    checkLabel.innerText = "Analizando...";
    bubble.style.background = "rgba(255, 255, 0, 0.1)";

    const reader = new FileReader();
    reader.onload = async (e) => {
        try {
            const arrayBuffer = e.target.result;
            const workbook = new ExcelJS.Workbook();
            await workbook.xlsx.load(arrayBuffer);
            
            const worksheet = workbook.worksheets[0];
            const regexMayusTildes = /[A-ZáéíóúÁÉÍÓÚ]/;

            // 1. Mapear qué columnas del Excel coinciden con nuestra lista
            let indicesColumnas = [];
            const filaCabecera = worksheet.getRow(1);
            
            filaCabecera.eachCell((celda, numCol) => {
                const nombreCabecera = celda.value?.toString().trim().toUpperCase();
                // Verificamos si la cabecera (en mayúsculas para evitar fallos) está en nuestra lista
                if (COLUMNAS_DIANA.some(diana => diana.toUpperCase() === nombreCabecera)) {
                    indicesColumnas.push(numCol);
                }
            });

            if (indicesColumnas.length === 0) {
                alert("No se han encontrado las columnas: ID OPORTUNIDAD, ID NACS, NOMBRES o APELLIDOS");
                return;
            }

            // 2. Procesar filas (saltando la 1)
            worksheet.eachRow((fila, numFila) => {
                if (numFila === 1) return;

                indicesColumnas.forEach(index => {
                    const celda = fila.getCell(index);
                    const valorStr = celda.value ? String(celda.value).trim() : "";
                    
                    if (regexMayusTildes.test(valorStr)) {
                        celda.fill = {
                            type: 'pattern',
                            pattern: 'solid',
                            fgColor: { argb: 'FFFF00' }
                        };
                        celda.border = {
                            top: {style:'thin', color: {argb: 'FFD4D400'}},
                            left: {style:'thin', color: {argb: 'FFD4D400'}},
                            bottom: {style:'thin', color: {argb: 'FFD4D400'}},
                            right: {style:'thin', color: {argb: 'FFD4D400'}}
                        };
                    }
                });
            });

            // 3. Descarga
            const buffer = await workbook.xlsx.writeBuffer();
            const blob = new Blob([buffer], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
            saveAs(blob, "REVISADO_" + file.name);

            checkLabel.innerText = "¡Listo!";
        } catch (err) {
            console.error(err);
            checkLabel.innerText = "Error!";
        } finally {
            setTimeout(() => {
                checkLabel.innerText = "Herramienta Check";
                bubble.style.background = "";
            }, 3000);
        }
    };
    reader.readAsArrayBuffer(file);
}

// --- DATOS DE FECHAS (SIMULADOS) ---
const BRANDS = [
  { id:'obs',      name:'OBS',      color:'#1dcc84' },
  { id:'inesdi',   name:'INESDI',   color:'#a878f0' },
  { id:'esdesign', name:'ESDesign', color:'#f0a830' },
  { id:'ucma',     name:'UCMA',     color:'#3aabf0' }
];

function renderGrid() {
  const grid = document.getElementById('brandsGrid');
  grid.innerHTML = BRANDS.map(b => `
    <div class="brand-card ${b.id}">
      <span class="brand-name-badge">${b.name}</span>
      <div class="date-row">
        <div class="date-item">
          <span class="date-lbl">Estado</span>
          <span class="date-val">Sincronizado</span>
        </div>
      </div>
    </div>
  `).join('');
}
setTimeout(renderGrid, 800);
</script>
</body>
</html>
